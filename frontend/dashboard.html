}

// ── Requester View ────────────────────────────────────────────────────────────
async function openRequesterView(requestId) {
  showMain(`<div class="loading-state">Loading request status…</div>`);
  try {
    const [rr, sr] = await Promise.all([
      fetch(`${API_BASE}/requests/${requestId}`),
      fetch(`${API_BASE}/requests/${requestId}/approval-steps`),
    ]);
    if (!rr.ok || !sr.ok) throw new Error("Failed to load request");
    S.req   = await rr.json();
    S.steps = await sr.json();
    S.prevView = S.view;
    S.view = "requester";
    ["tasks","requests"].forEach(n =>
      document.getElementById(`nav-${n}`)?.classList.remove("active")
    );
    document.getElementById("nav-requester")?.classList.add("active");
    // Update URL so the view is bookmarkable / shareable
    history.pushState({ view: "requester", req: requestId }, "", `/dashboard?req=${requestId}`);
    renderRequesterView(S.req, S.steps);
  } catch (e) {
    showMain(`<div class="content"><div class="error-banner">Could not load request: ${esc(e.message)}</div></div>`);
  }
}

function backFromRequester() {
  history.pushState({ view: S.prevView || "requests" }, "", "/dashboard#" + (S.prevView || "requests"));
  S.view = S.prevView || "requests";
  ["tasks","requests","requester"].forEach(n =>
    document.getElementById(`nav-${n}`)?.classList.toggle("active", n === S.view)
  );
  if (S.view === "tasks") loadQueue();
  else loadRequests();
}

function renderRequesterPicker() {
  // "Track Request" clicked from sidebar — show All Requests so user can click "📍 Track" on a row.
  S.view = "requests";
  document.getElementById("nav-requests")?.classList.add("active");

}

function showMain(html) { document.getElementById("main-content").innerHTML = html; }

function statusBadge(status, override) {
  const labels = { active:"Active", approved:"Approved", rejected:"Rejected", escalated:"Escalated",
                   pending:"Waiting", skipped:"Skipped", in_review:"In Review", cancelled:"Cancelled" };
  return `<span class="status-badge status-${esc(status)}">${esc(override||labels[status]||status)}</span>`;
}

function riskBadge(risk) {
  if (!risk) return "—";
  return `<span class="risk-badge risk-${esc(risk)}">${esc(risk[0].toUpperCase()+risk.slice(1))}</span>`;
}

function formatCurrency(n) {
  if (n==null) return "—";
  return `£${Number(n).toLocaleString("en-GB",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
}

function numFmt(n) { return n!=null ? Number(n).toFixed(3) : ""; }

function formatDate(iso) {
  if (!iso) return "—";
  return new Date(iso).toLocaleString("en-GB",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function formatDateShort(iso) {
  if (!iso) return "";
  return new Date(iso).toLocaleDateString("en-GB",{day:"2-digit",month:"short"});
}

function computeTCV(req) {
  if (!req.spend_amount) return "—";
  const dur = (req.contract_duration || "").toLowerCase();
  const months = (dur.includes("36") || dur.includes("3 year") || dur.includes("3-year")) ? 36 :
                 (dur.includes("24") || dur.includes("2 year") || dur.includes("2-year")) ? 24 :
                 (dur.includes("12") || dur.includes("1 year") || dur.includes("annual"))  ? 12 : null;
  if (req.spend_type !== "one_time" && months)
    return `${formatCurrency(req.spend_amount * months / 12)} total over ${months} months`;
  if (req.spend_type === "one_time")
    return `${formatCurrency(req.spend_amount)} (one-time payment)`;
  return `${formatCurrency(req.spend_amount)}/year (duration not specified)`;
}

function renderSourceData(role, req, collapsed = false) {
  const fields = ROLE_SOURCE_FIELDS[role];
  if (!fields || !req) return "";
  const LONG = new Set(["Business Justification","Service Description"]);
  const rows = fields.map(([label, valueFn]) => {
    let val;
    try { val = valueFn(req); } catch(e) { return ""; }
    if (!val || val === "—") return "";
    if (LONG.has(label)) {
      return `<div class="source-row full-width" style="padding-top:0.45rem">
        <div class="source-label" style="margin-bottom:0.2rem">${esc(label)}</div>
        <div class="source-value" style="font-weight:400;color:#4A5568;line-height:1.5;font-size:0.82rem">${esc(String(val))}</div>
      </div>`;
    }
    const muted = String(val).startsWith("⚠") || val === "Not specified" || val === "None declared" || val === "None";
    return `<div class="source-row">
      <div class="source-label">${esc(label)}</div>
      <div class="source-value${muted?" source-value-muted":""}">${esc(String(val))}</div>
    </div>`;
  }).filter(Boolean).join("");
  if (!rows) return "";
  const id = `src-${role}-${Math.random().toString(36).slice(2,6)}`;
  return `
    <div class="source-section">
      <div class="source-section-hdr${collapsed?"":" open"}" onclick="toggleSource('${esc(id)}',this)">
        Supporting Intake Data
      </div>
      <div id="${esc(id)}" class="source-data-body" style="${collapsed?"display:none":""}">
        ${rows}
      </div>
    </div>`;
}

function toggleSource(id, hdr) {
  const el = document.getElementById(id);
  if (!el) return;
  const isOpen = el.style.display !== "none";
  el.style.display = isOpen ? "none" : "";
  hdr.classList.toggle("open", !isOpen);
}

// ── taskStatus — computes dynamic badge for Pending Approvals rows based on step age
function taskStatus(step) {
  const ageMin = step.created_at
    ? (Date.now() - new Date(step.created_at).getTime()) / 60000
    : 0;
  if (ageMin > ESCALATION_MINUTES)
    return { cls: "status-badge task-status-overdue",     label: "⏰ Overdue" };
  if (ageMin > ESCALATION_MINUTES * 0.5)
    return { cls: "status-badge task-status-in-progress", label: "⏱ In Progress" };
  return   { cls: "status-badge task-status-not-started", label: "Not started" };
}

// extractFirstBullet — pulls first sentence/bullet for summary preview in task rows
function extractFirstBullet(text) {
  if (!text) return "";
  // Try to grab the first "• ..." bullet
  const bulletMatch = text.match(/•\s+([^•\n]+)/);
  if (bulletMatch) return bulletMatch[1].trim().replace(/\.$/, "");
  // Fall back to first sentence
  const sentMatch = text.match(/^([^.!?]+[.!?])/);
  return sentMatch ? sentMatch[1].trim() : text.slice(0, 100).trim();
}

function summaryBullets(text) {
  if (!text) return "";
  // Handle structured "• bullet" format from the new prompts
  if (text.includes("• ")) {
    const bullets = text.split(/\n?•\s+/).map(s=>s.trim()).filter(Boolean);
    return bullets.map(s=>`<li>${esc(s)}</li>`).join("");
  }
  // Fall back to sentence splitting
  const sentences = text.split(/(?<=[.!?])\s+/).map(s=>s.trim()).filter(Boolean);
  return (sentences.length ? sentences : [text]).map(s=>`<li>${esc(s)}</li>`).join("");
}

function esc(s) {
  if (s==null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#039;");
}

const DONUT_COLORS = ['#7B8FFF','#276749','#B7791F','#C05621','#2B6CB0','#553C9A','#B83280','#2C7A7B'];

function donutChart(segments, size, thickness, label, sub) {
  size = size||160; thickness = thickness||36;
  const total = segments.reduce((s,x) => s + x.value, 0);
  if (!total) return `<div style="width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;color:#A0AEC0;font-size:.8rem">No data</div>`;
  const cx=size/2, cy=size/2, r=(size-thickness)/2;
  const C = 2*Math.PI*r;
  let arcs='', cumFrac=0;
  segments.forEach(seg => {
    if (!seg.value) return;
    const frac = seg.value/total;
    const dash = frac*C;
    const offset = C/4 - cumFrac*C;
    arcs += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${seg.color}" stroke-width="${thickness-2}" stroke-dasharray="${dash.toFixed(2)} ${(C-dash).toFixed(2)}" stroke-dashoffset="${offset.toFixed(2)}"/>`;
    cumFrac += frac;
  });
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0;overflow:visible">
    <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EDF2F7" stroke-width="${thickness-2}"/>
    ${arcs}
    ${label ? `<text x="${cx}" y="${sub?cy-7:cy}" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="700" fill="#2D3748" font-family="-apple-system,sans-serif">${label}</text>` : ''}
    ${sub   ? `<text x="${cx}" y="${cy+11}" text-anchor="middle" dominant-baseline="middle" font-size="10" fill="#718096" font-family="-apple-system,sans-serif">${sub}</text>` : ''}
  </svg>`;
}

function conditionText(rule) {
  if (rule.always) return "Always applies";
  const c = rule.condition || {};
  const parts = [];
  if (c.spend_amount_gt != null) parts.push(`Spend > ${formatCurrency(c.spend_amount_gt)}`);
  if (c.category)      parts.push([].concat(c.category).join(", "));
  if (c.data_access)   parts.push([].concat(c.data_access).map(v => v.replace(/_/g," ")).join(" or "));
  if (c.geography)     parts.push([].concat(c.geography).join(", "));
  if (c.is_new_supplier) parts.push("New supplier");
  return parts.length ? parts.join(" + ") : "No condition";
}

  const trigger = flow.trigger;
  function triggerSummary(t) {
    if (!t) return flow.id === "default" ? "fallback" : "no trigger";
    const parts = [];
    if (t.category)        parts.push([].concat(t.category).join("/"));
    if (t.spend_amount_gt) parts.push(`>£${t.spend_amount_gt.toLocaleString()}`);
    if (t.spend_amount_lte)parts.push(`≤£${t.spend_amount_lte.toLocaleString()}`);
    if (t.is_new_supplier != null) parts.push(t.is_new_supplier ? "new supplier" : "existing supplier");
    if (t.data_access)     parts.push([].concat(t.data_access).join("/"));
    if (t.geography)       parts.push([].concat(t.geography).join("/"));
    return parts.join(" + ") || "custom trigger";
  }
  const triggerLabel = triggerSummary(trigger);
  const triggerBadge = `<button class="flow-tab-trigger" style="cursor:pointer;background:none;border:1px solid #E2E8F0;border-radius:4px;padding:0.1rem 0.45rem;font-size:0.62rem;color:#718096;font-weight:600" onclick="openFlowModal('${esc(flow.id)}')" title="Edit trigger">${esc(triggerLabel)} ✎</button>`;
  const canDelete = flows.length > 1;
  return `<div class="flow-info-bar">
    <input class="flow-info-name" value="${esc(flow.name)}"
           onchange="renameActiveFlow(this.value)"
           onkeydown="if(event.key==='Enter')this.blur()"
           title="Click to rename">
    ${triggerBadge}
    <span class="flow-info-meta">${stages.length} stage${stages.length!==1?"s":""} · ${nApprv} approver${nApprv!==1?"s":""}</span>
    <span style="flex:1"></span>
    ${canDelete ? `<button class="btn btn-outline" style="font-size:0.72rem;padding:0.2rem 0.6rem;color:#EF4444;border-color:#FECACA" onclick="deleteFlow('${esc(flow.id)}')">Delete flow</button>` : ""}
    <button class="flow-add-btn" style="white-space:nowrap" onclick="createFlow()">＋ New Flow</button>
  </div>`;
}

function renderCanvas() {
  const rules  = getActiveFlow()?.approval_rules || [];
  const stages = getStages();
  const parts  = [];
  parts.push(`<div class="canvas-terminal">⬤&nbsp; Request Submitted</div>`);
  stages.forEach((stage, si) => {
    const indexed = rules.map((r,i) => ({r,i})).filter(({r}) => r.sequence_group === stage.id);
    parts.push(renderStepCol(stage, indexed));
    // Insert-between button after every stage except the last
    if (si < stages.length - 1) {
      parts.push(`<button class="canvas-insert-btn" data-no-connector title="Insert stage here" onclick="insertStage(${stage.id})">+</button>`);
    }
  });
  parts.push(`<div class="canvas-add-stage" onclick="addStage()"
    ondragover="event.preventDefault()"
    ondragenter="this.classList.add('drag-over')"
    ondragleave="if(!this.contains(event.relatedTarget))this.classList.remove('drag-over')"
    ondrop="onAddStageDrop(event)"><span class="canvas-add-stage-plus">+</span>Add Stage</div>`);
  parts.push(`<div class="canvas-terminal canvas-terminal-end">✓&nbsp; Approved</div>`);
  return parts.join("");
}

function renderStepCol(stage, indexedRules) {
  const wide   = indexedRules.length > 3;
  const blocks = indexedRules.length
    ? indexedRules.map(({r, i}) => renderBlock(r, i)).join("")
    : `<div class="canvas-empty-slot" onclick="openAddModal(${stage.id})">+ Add block<br><span style="font-size:0.62rem;opacity:0.7">approval or action</span></div>`;

  return `
    <div class="canvas-step-col${wide ? ' wide' : ''}" data-group="${stage.id}"
      ondragover="onStageDragOver(event)"
      ondragenter="onStageDragEnter(event)"
      ondragleave="onStageDragLeave(event)"
      ondrop="onStageDrop(event,${stage.id})">
      <div class="canvas-group-tag">
        <input class="stage-name-input" value="${esc(stage.name)}"
          onblur="renameStage(${stage.id}, this.value)"
          onkeydown="if(event.key==='Enter')this.blur()">
        <button class="stage-delete-btn" onclick="deleteStage(${stage.id})" title="Delete stage">×</button>
      </div>
      ${blocks}
    </div>`;
}

function renderBlock(rule, globalIdx) {
  const type = rule.type || "approval";

    const roleObj   = getRoleById(rule.role);
    const roleName  = esc(roleObj?.name || ROLE_DISPLAY[rule.role] || rule.role);

          <button class="canvas-block-btn del" onclick="event.stopPropagation();deleteRule(${globalIdx})">Remove</button>

// ── SVG bezier connectors ─────────────────────────────────────────────────────

function drawConnectors() {
  const svg  = document.getElementById("canvas-svg");
  const flow = document.getElementById("canvas-flow-h");
  if (!svg || !flow) return;

  const fr = flow.getBoundingClientRect();

  function relRect(el) {
    const r = el.getBoundingClientRect();
    return {
      left:  r.left  - fr.left,
      right: r.right - fr.left,
      cy:    (r.top  + r.bottom) / 2 - fr.top,
    };
  }

  // All direct children except the SVG overlay and insert-between buttons
  const nodes = [...flow.children].filter(el =>
    el.id !== "canvas-svg" &&
    el.tagName.toLowerCase() !== "svg" &&
    !el.hasAttribute("data-no-connector")
  );

  let paths = "";
  for (let i = 0; i < nodes.length - 1; i++) {
    const a = relRect(nodes[i]);
    const b = relRect(nodes[i + 1]);
    const mx = (a.right + b.left) / 2;
    paths += `<path d="M${a.right},${a.cy} C${mx},${a.cy} ${mx},${b.cy} ${b.left},${b.cy}"
      fill="none" stroke="#CBD5E0" stroke-width="1.5" marker-end="url(#wf-arr)"/>`;
  }

  svg.innerHTML =
    `<defs><marker id="wf-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">` +
    `<path d="M0,0 L0,6 L6,3z" fill="#CBD5E0"/></marker></defs>` +
    paths;
}

// ── Drag and drop ─────────────────────────────────────────────────────────────

let _dragState = null;

function onToolboxDragStart(e, typeKey) {
  _dragState = { source: "toolbox", typeKey };
  e.dataTransfer.effectAllowed = "copy";
  e.dataTransfer.setData("text/plain", typeKey);
}

function onBlockDragStart(e, ruleIdx) {
  _dragState = { source: "canvas", ruleIdx };
  e.dataTransfer.effectAllowed = "move";
  e.dataTransfer.setData("text/plain", String(ruleIdx));
  e.stopPropagation();
}

function onStageDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = _dragState?.source === "canvas" ? "move" : "copy";
}

function onStageDragEnter(e) {
  e.currentTarget.classList.add("drag-over");
}

function onStageDragLeave(e) {
  if (!e.currentTarget.contains(e.relatedTarget)) {
    e.currentTarget.classList.remove("drag-over");
  }
}

function _blockFromTypeKey(typeKey, stageId) {
  const [kind, key] = typeKey.split(":");
  if (kind === "approval") return { role: key, sequence_group: stageId, always: true };
  return { type: key, label: BLOCK_TYPES[key]?.label || key, sequence_group: stageId };
}

function _stageNameFromTypeKey(typeKey) {
  const [kind, key] = typeKey.split(":");
  if (kind === "approval") return (getRoleById(key)?.name || ROLE_DISPLAY[key] || key) + " Review";
  return BLOCK_TYPES[key]?.label || key;
}

function onStageDrop(e, stageId) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  const state = _dragState;
  _dragState = null;
  if (!state) return;

  if (state.source === "toolbox") {
    const rules = [...(getActiveFlow()?.approval_rules || [])];
    rules.push(_blockFromTypeKey(state.typeKey, stageId));
    _updateActiveFlow({ approval_rules: rules });
    renderWorkflowBuilder();
  } else if (state.source === "canvas") {
    const rules = [...(getActiveFlow()?.approval_rules || [])];
    if (rules[state.ruleIdx]?.sequence_group === stageId) return;
    rules[state.ruleIdx] = { ...rules[state.ruleIdx], sequence_group: stageId };
    _updateActiveFlow({ approval_rules: rules });
    renderWorkflowBuilder();
  }
}

function onAddStageDrop(e) {
  e.preventDefault();
  e.currentTarget.classList.remove("drag-over");
  const state = _dragState;
  _dragState = null;
  if (!state) return;

  const stages = getStages();
  const newId  = Math.max(0, ...stages.map(s => s.id)) + 1;
  const rules  = [...(getActiveFlow()?.approval_rules || [])];

  if (state.source === "canvas") {
    rules[state.ruleIdx] = { ...rules[state.ruleIdx], sequence_group: newId };
  } else if (state.source === "toolbox") {
    rules.push(_blockFromTypeKey(state.typeKey, newId));
  } else return;

  const stageName = state.source === "toolbox"
    ? _stageNameFromTypeKey(state.typeKey)
    : `Stage ${newId}`;
  _updateActiveFlow({ stages: [...stages, { id: newId, name: stageName }], approval_rules: rules });
  renderWorkflowBuilder();
}

let _pendingBlockType = null;

function addBlock(type) {
  _editIndex = null;
  const meta    = BLOCK_TYPES[type] || { icon: "▪", label: type };
  _pendingBlockType = type;
  const stages  = getStages();
  const stageId = _pendingStageId ?? stages[stages.length - 1]?.id ?? stages[0]?.id ?? 1;
  document.getElementById("rule-modal-box").innerHTML = _buildActionBlockModalHtml(meta, meta.label, stageId, null);
  document.getElementById("rule-modal").style.display = "";
}

function addApprovalBlock(role) {
  openAddModal(getStages()[0]?.id || 1);
  const sel = document.getElementById("modal-role");
  if (sel) sel.value = role;
}

let _pendingStageId = null;

function openAddModal(stageId) {
  _pendingStageId = stageId;
  openRuleModal(null);
}

function addStage() {
  const stages = getStages();
  const newId  = Math.max(0, ...stages.map(s => s.id)) + 1;
  _updateActiveFlow({ stages: [...stages, { id: newId, name: `Stage ${newId}` }] });
  renderWorkflowBuilder();
}

function insertStage(afterStageId) {
  const stages = getStages();
  const idx    = stages.findIndex(s => s.id === afterStageId);
  if (idx === -1) return;
  const newId  = Math.max(0, ...stages.map(s => s.id)) + 1;
  const newStages = [
    ...stages.slice(0, idx + 1),
    { id: newId, name: "New Stage" },
    ...stages.slice(idx + 1),
  ];
  _updateActiveFlow({ stages: newStages });
  renderWorkflowBuilder();
}

function deleteStage(id) {
  const blockCount = (getActiveFlow()?.approval_rules || []).filter(r => r.sequence_group === id).length;
  const msg = blockCount > 0 ? `Delete this stage and its ${blockCount} block(s)?` : "Delete this stage?";
  if (!confirm(msg)) return;
  _updateActiveFlow({
    stages: getStages().filter(s => s.id !== id),
    approval_rules: (getActiveFlow()?.approval_rules || []).filter(r => r.sequence_group !== id),
  });
  renderWorkflowBuilder();
}

function renameStage(id, name) {
  const trimmed = name.trim();
  if (!trimmed) return;
  _updateActiveFlow({ stages: getStages().map(s => s.id === id ? { ...s, name: trimmed } : s) });
}

function _stagePickerCards(selectedId) {
  return getStages().map(s => `
    <label class="group-radio-card${selectedId === s.id ? ' selected' : ''}" onclick="selectGroup(${s.id})">
      <input type="radio" name="modal-group" value="${s.id}"${selectedId === s.id ? ' checked' : ''}>
      <div class="group-radio-name">${esc(s.name)}</div>
    </label>`).join("");
}

function _buildActionBlockModalHtml(meta, currentLabel, currentGroup, editIdx) {
  const groupCards = _stagePickerCards(currentGroup);

  const saveCall = editIdx !== null ? `saveBlockLabel(${editIdx})` : `saveNewBlock()`;
  return `
    <div class="modal-hdr">
      <div class="modal-title">${meta.icon} ${editIdx !== null ? 'Edit' : 'Add'} ${esc(meta.label)} Block</div>
      <div class="modal-subtitle">Choose a label and which stage this step belongs to</div>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Label</label>
        <input id="block-label-input" class="modal-input" value="${esc(currentLabel)}" placeholder="Block label…">
      </div>
      <div class="modal-field">
        <label class="modal-label">Stage</label>
        <div class="group-radio-grid">${groupCards}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRuleModal()">Cancel</button>
      <button class="btn btn-approve" onclick="${saveCall}">Save</button>

function openBlockModal(globalIdx) {
  const rule = getActiveFlow()?.approval_rules[globalIdx];
  if (!rule) return;
  if ((rule.type || "approval") === "approval") { openRuleModal(globalIdx); return; }

  const meta = BLOCK_TYPES[rule.type] || { icon: "▪", label: rule.type };
  document.getElementById("rule-modal-box").innerHTML =
    _buildActionBlockModalHtml(meta, rule.label || meta.label, rule.sequence_group || 4, globalIdx);
  document.getElementById("rule-modal").style.display = "";
}

function saveNewBlock() {
  const label = document.getElementById("block-label-input")?.value?.trim();
  const group = parseInt(document.querySelector('input[name="modal-group"]:checked')?.value) || 4;
  if (!label) { alert("Please enter a label."); return; }
  const rules = [...(getActiveFlow()?.approval_rules || [])];
  rules.push({ type: _pendingBlockType, label, sequence_group: group });
  _updateActiveFlow({ approval_rules: rules });
  _pendingBlockType = null;
  closeRuleModal();
  renderWorkflowBuilder();
}

function saveBlockLabel(idx) {
  const label = document.getElementById("block-label-input")?.value?.trim();
  const group = parseInt(document.querySelector('input[name="modal-group"]:checked')?.value) || 4;
  if (!label) { alert("Please enter a label."); return; }
  const rules = [...(getActiveFlow()?.approval_rules || [])];
  rules[idx] = { ...rules[idx], label, sequence_group: group };
  _updateActiveFlow({ approval_rules: rules });
  closeRuleModal();
  renderWorkflowBuilder();
}


function loadFlowAsTemplate(flowId) {
  const src = (_wfConfig?.flows || []).find(f => f.id === flowId);
  if (!src) return;
  if (!confirm(`Copy rules from "${src.name}" onto the current canvas? Unsaved changes will be lost.`)) return;
  _updateActiveFlow({
    stages:         (src.stages        || []).map(s => ({...s})),
    approval_rules: (src.approval_rules|| []).map(r => ({...r})),
  });
  renderWorkflowBuilder();
}

async function saveAsNewFlow() {
  const src  = getActiveFlow();
  if (!src) return;
  const name = prompt("Name for the new flow:", src.name + " copy");
  if (!name?.trim()) return;
  const newId   = `flow_${Date.now()}`;
  const newFlow = {
    id:             newId,
    name:           name.trim(),
    trigger:        src.trigger ? { ...src.trigger } : null,
    stages:         (src.stages         || []).map(s => ({...s})),
    approval_rules: (src.approval_rules || []).map(r => ({...r})),
  };
  // Add to config (leaving active flow untouched) and save immediately
  _wfConfig = { ..._wfConfig, flows: [...(_wfConfig?.flows || []), newFlow] };
  try {
    const r = await fetch(`${API_BASE}/workflow-config`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(_wfConfig),
    });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
    _activeFlowId = newId;   // switch to the new flow
    await loadWorkflowConfig();
  } catch (e) {
    alert(`Save failed: ${e.message}`);
  }
}

function renameActiveFlow(name) {
  if (!name.trim()) return;
  _updateActiveFlow({ name: name.trim() });
}

async function saveWorkflowConfig() {
  const btn = document.getElementById('save-publish-btn');
  if (btn.disabled) return;
  btn.disabled = true;
  btn.textContent = '⟳ Publishing…';
  try {
    const r = await fetch(`${API_BASE}/workflow-config`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(_wfConfig),
    });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
    btn.textContent = '✓ Published';
    await loadWorkflowConfig();
    refreshBadge();
    setTimeout(() => {
      if (btn) { btn.disabled = false; btn.textContent = 'Save & Publish'; }
    }, 2000);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Save & Publish';
    alert(`Save failed: ${e.message}`);
  }
}

function selectFlow(id) {
  _activeFlowId = id;
  renderWorkflowBuilder();
}

function createFlow() {
  const flows = _wfConfig?.flows || [];
  const newId = "flow_" + Date.now();
  const newFlow = {
    id: newId,
    name: "New Flow",
    trigger: null,
    stages: [{ id: 1, name: "Initial Gate" }],
    approval_rules: [{ always: true, role: "manager", sequence_group: 1 }],
  };
  _wfConfig = { ..._wfConfig, flows: [...flows, newFlow] };
  _activeFlowId = newId;
  renderWorkflowBuilder();
  // Auto-open flow modal to rename/set trigger
  openFlowModal(newId);
}

function deleteFlow(id) {
  const flows = _wfConfig?.flows || [];
  const flow  = flows.find(f => f.id === id);
  if (!confirm(`Delete the "${flow?.name || id}" flow? All its stages and rules will be removed.`)) return;
  const remaining = flows.filter(f => f.id !== id);
  if (!remaining.length) { alert("Cannot delete the last flow."); return; }
  _wfConfig = { ..._wfConfig, flows: remaining };
  if (_activeFlowId === id) _activeFlowId = remaining[0].id;
  renderWorkflowBuilder();
}

  { key: "spend_amount_gt", label: "Spend exceeds",    type: "number",   suffix: "£" },

  { key: "geography",       label: "Geography",        type: "multicheck",
    options: ["UK","EU","US","Global"] },
];

// Working copy of trigger conditions while the modal is open
let _triggerConds = [];   // [{ key, value }]

function _triggerFieldDef(key) { return TRIGGER_FIELDS.find(f => f.key === key); }

function _renderTriggerCondRow(cond, idx) {
  const def     = _triggerFieldDef(cond.key);
  const fieldSel = TRIGGER_FIELDS.map(f =>
    `<option value="${f.key}"${f.key === cond.key ? " selected" : ""}>${f.label}</option>`
  ).join("");

  let valueHtml = "";
  if (def?.type === "multicheck") {
    valueHtml = `<div style="display:flex;flex-wrap:wrap;gap:0.3rem 0.6rem;margin-top:0.3rem">` +
      def.options.map(o => {
        const checked = [].concat(cond.value||[]).includes(o);
        return `<label style="display:inline-flex;align-items:center;gap:0.25rem;font-size:0.8rem;cursor:pointer">
          <input type="checkbox" data-tc-val="${idx}" value="${o}"${checked?" checked":""}
            style="accent-color:#7B8FFF" onchange="_syncTriggerCond(${idx})"> ${o}
        </label>`;
      }).join("") + `</div>`;
  } else if (def?.type === "number") {
    valueHtml = `<div style="display:flex;align-items:center;gap:0.35rem;margin-top:0.3rem">
      <span style="font-size:0.8rem;color:#718096">${def.suffix||""}</span>
      <input type="number" min="0" step="1000" value="${cond.value||""}"
        data-tc-num="${idx}" style="width:110px" class="modal-input"
        oninput="_syncTriggerCond(${idx})">

  } else if (def?.type === "boolean") {
    const val = cond.value === true || cond.value === "true";
    valueHtml = `<div style="display:flex;gap:0.5rem;margin-top:0.3rem">
      <label style="font-size:0.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:0.25rem">
        <input type="radio" name="tc-bool-${idx}" value="true"${val?" checked":""} onchange="_syncTriggerCond(${idx})" style="accent-color:#7B8FFF"> Yes
      </label>
      <label style="font-size:0.8rem;cursor:pointer;display:inline-flex;align-items:center;gap:0.25rem">

      </label>
    </div>`;
  }

  return `<div class="cond-row" data-tc-row="${idx}" style="border:1px solid #E2E8F0;border-radius:6px;padding:0.5rem 0.6rem;margin-bottom:0.4rem">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <select class="modal-input" style="width:auto;font-size:0.8rem" onchange="_changeTriggerField(${idx},this.value)">${fieldSel}</select>
      <button onclick="_removeTriggerCond(${idx})" style="background:none;border:none;color:#CBD5E0;cursor:pointer;font-size:1rem;padding:0 0.2rem" title="Remove">×</button>
    </div>
    <div class="tc-value-area">${valueHtml}</div>
  </div>`;
}

function _renderTriggerBuilder() {
  const rows = _triggerConds.map((c, i) => _renderTriggerCondRow(c, i)).join("");
  document.getElementById("flow-trigger-conds").innerHTML =
    rows + `<button class="add-cond-btn" onclick="_addTriggerCond()" style="margin-top:0.1rem">+ Add condition</button>`;
}

function _addTriggerCond() {
  // Default to the first field not already used, or category
  const usedKeys = _triggerConds.map(c => c.key);
  const next = TRIGGER_FIELDS.find(f => !usedKeys.includes(f.key)) || TRIGGER_FIELDS[0];
  const defaultVal = next.type === "multicheck" ? [] : next.type === "boolean" ? true : "";
  _triggerConds.push({ key: next.key, value: defaultVal });
  _renderTriggerBuilder();
}

function _removeTriggerCond(idx) {
  _triggerConds.splice(idx, 1);
  _renderTriggerBuilder();
}

function _changeTriggerField(idx, newKey) {
  const def = _triggerFieldDef(newKey);
  _triggerConds[idx] = { key: newKey, value: def?.type === "multicheck" ? [] : def?.type === "boolean" ? true : "" };
  _renderTriggerBuilder();
}

function _syncTriggerCond(idx) {
  const def = _triggerFieldDef(_triggerConds[idx].key);
  if (def?.type === "multicheck") {
    _triggerConds[idx].value = [...document.querySelectorAll(`[data-tc-val="${idx}"]:checked`)].map(el => el.value);
  } else if (def?.type === "number") {
    const v = parseFloat(document.querySelector(`[data-tc-num="${idx}"]`)?.value);
    _triggerConds[idx].value = isNaN(v) ? "" : v;
  } else if (def?.type === "boolean") {
    _triggerConds[idx].value = document.querySelector(`input[name="tc-bool-${idx}"]:checked`)?.value === "true";
  }
}

function openFlowModal(id) {
  _editFlowId = id;
  const flow = (_wfConfig?.flows || []).find(f => f.id === id);
  if (!flow) return;

  // Convert stored trigger → _triggerConds working copy
  _triggerConds = flow.trigger
    ? Object.entries(flow.trigger).map(([key, value]) => ({ key, value }))
    : [];

  const isFallback = !flow.trigger;
  document.getElementById("rule-modal-box").innerHTML = `
    <div class="modal-hdr">
      <div class="modal-title">Flow Settings</div>
      <div class="modal-subtitle">Name and routing conditions — all conditions must match (AND)</div>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Flow Name</label>
        <input id="flow-name-input" class="modal-input" value="${esc(flow.name)}" placeholder="e.g. High-value Hardware">
      </div>
      <div class="modal-field">
        <label class="modal-label" style="margin-bottom:0.4rem">Route to this flow when…</label>
        <label class="always-toggle" style="margin-bottom:0.5rem">
          <input type="checkbox" id="flow-fallback-chk"${isFallback?" checked":""}
            style="accent-color:#7B8FFF" onchange="_renderTriggerBuilder()">
          <span class="always-toggle-label">Use as fallback (catches requests that match no other flow)</span>
        </label>
        <div id="flow-trigger-conds" style="${isFallback?'opacity:0.4;pointer-events:none':''}"></div>
      </div>
      <div style="font-size:0.68rem;color:#A0AEC0;margin-top:0.25rem;line-height:1.5">
        Flows are checked in order — the first match wins. Put more specific flows above broader ones in My Flows.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRuleModal()">Cancel</button>
      <button class="btn btn-approve" onclick="saveFlowModal()">Save</button>
    </div>`;

  document.getElementById("rule-modal").style.display = "";
  _renderTriggerBuilder();

  document.getElementById("flow-fallback-chk").addEventListener("change", function() {
    document.getElementById("flow-trigger-conds").style.cssText =
      this.checked ? "opacity:0.4;pointer-events:none" : "";
  });
}

function saveFlowModal() {
  const name = document.getElementById("flow-name-input")?.value?.trim();
  if (!name) { alert("Please enter a flow name."); return; }

  // Sync any un-blurred inputs
  _triggerConds.forEach((_, i) => _syncTriggerCond(i));

  const isFallback = document.getElementById("flow-fallback-chk")?.checked;
  let trigger = null;
  if (!isFallback && _triggerConds.length > 0) {
    trigger = {};
    for (const { key, value } of _triggerConds) {
      // Skip empty/incomplete conditions
      if (value === "" || (Array.isArray(value) && value.length === 0)) continue;
      trigger[key] = value;
    }
    if (Object.keys(trigger).length === 0) trigger = null;
  }

  const flows = (_wfConfig?.flows || []).map(f =>
    f.id === _editFlowId ? { ...f, name, trigger } : f
  );
  _wfConfig = { ..._wfConfig, flows };
  closeRuleModal();
  renderWorkflowBuilder();
}

// ── Role management ───────────────────────────────────────────────────────────

let _editRoleId      = null;
let _rolePersonRows  = [];

function openRoleModal(roleId) {
  _editRoleId     = roleId;
  const role      = roleId ? getRoleById(roleId) : null;
  _rolePersonRows = role?.people ? role.people.map(p => ({...p})) : [{ name: "", title: "" }];
  _renderRoleModal(role);
}

function _renderRoleModal(role) {
  const personRows = _rolePersonRows.map((p, i) => `
    <div class="role-person-row">
      <input class="modal-input" placeholder="Full name" value="${esc(p.name)}"
        oninput="_rolePersonRows[${i}].name=this.value" style="flex:1;min-width:0">
      <input class="modal-input" placeholder="Title" value="${esc(p.title)}"
        oninput="_rolePersonRows[${i}].title=this.value" style="flex:1;min-width:0">
      <button class="stage-delete-btn" onclick="removeRolePersonRow(${i})" style="margin-left:0.2rem">×</button>
    </div>`).join("");

  document.getElementById("rule-modal-box").innerHTML = `
    <div class="modal-hdr">
      <div class="modal-title">${role ? `Edit ${esc(role.name)}` : "New Approver Role"}</div>
      <div class="modal-subtitle">Define the role name and who can act on it</div>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Role Name</label>
        <input id="role-name-input" class="modal-input" placeholder="e.g. IT Manager, Legal Head…" value="${esc(role?.name || '')}">
      </div>
      <div class="modal-field">
        <label class="modal-label">Assigned People</label>
        <div id="role-person-rows" style="display:flex;flex-direction:column;gap:0.4rem">${personRows}</div>
        <button class="add-cond-btn" onclick="addRolePersonRow()" style="margin-top:0.5rem">＋ Add person</button>
      </div>
    </div>
    <div class="modal-footer">
      ${role && !role.builtin ? `<button class="btn" style="color:#EF4444;border-color:#FCA5A5;margin-right:auto" onclick="deleteRole('${esc(role.id)}')">Delete Role</button>` : ""}
      <button class="btn btn-outline" onclick="closeRuleModal()">Cancel</button>
      <button class="btn btn-approve" onclick="saveRole()">Save Role</button>
    </div>`;
  document.getElementById("rule-modal").style.display = "";
}

function addRolePersonRow() {
  _rolePersonRows.push({ name: "", title: "" });
  _renderRoleModal(_editRoleId ? getRoleById(_editRoleId) : null);
}

function removeRolePersonRow(idx) {
  _rolePersonRows.splice(idx, 1);
  if (!_rolePersonRows.length) _rolePersonRows.push({ name: "", title: "" });
  _renderRoleModal(_editRoleId ? getRoleById(_editRoleId) : null);
}

function saveRole() {
  const name = document.getElementById("role-name-input")?.value?.trim();
  if (!name) { alert("Please enter a role name."); return; }
  const people = _rolePersonRows.filter(p => p.name.trim()).map(p => ({ name: p.name.trim(), title: p.title.trim() }));
  const roles  = getRoles();

  if (_editRoleId) {
    const idx = roles.findIndex(r => r.id === _editRoleId);
    if (idx >= 0) roles[idx] = { ...roles[idx], name, people };
  } else {
    const base = name.toLowerCase().replace(/\s+/g, "_").replace(/[^a-z0-9_]/g, "");
    let id = base, n = 2;
    while (roles.some(r => r.id === id)) id = `${base}_${n++}`;
    roles.push({ id, name, people });
  }

  _wfConfig = { ..._wfConfig, roles };
  closeRuleModal();
  renderWorkflowBuilder();
}

function deleteRole(roleId) {
  if (!confirm("Delete this role? Rules using it will need to be updated.")) return;
  _wfConfig = { ..._wfConfig, roles: getRoles().filter(r => r.id !== roleId) };
  closeRuleModal();
  renderWorkflowBuilder();
}

// ── Modal ─────────────────────────────────────────────────────────────────────

function openRuleModal(editIndex) {
  _editIndex = editIndex;
  const rule = editIndex !== null ? (getActiveFlow()?.approval_rules[editIndex] || null) : null;
  _condRows  = condToRows(rule);

  const selRole    = rule?.role || "manager";
  const stages   = getStages();
  const selGroup = rule?.sequence_group || _pendingStageId || stages[0]?.id || 1;
  const isAlways = !!rule?.always;

  const roleOptions = getRoles().map(r =>
    `<option value="${r.id}"${r.id === selRole ? " selected" : ""}>${esc(r.name)}${r.people?.length ? " — " + esc(r.people.map(p=>p.name).join(", ")) : ""}</option>`
  ).join("");

  const groupCards = _stagePickerCards(selGroup);

  document.getElementById("rule-modal-box").innerHTML = `
    <div class="modal-hdr">
      <div class="modal-title">${editIndex !== null ? "Edit Rule" : "Add Rule"}</div>
      <div class="modal-subtitle">Define when this approver is included in the workflow</div>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Approver Role</label>
        <select id="modal-role" class="modal-select">${roleOptions}</select>
      </div>
      <div class="modal-field">
        <label class="modal-label">Sequence Group</label>
        <div class="group-radio-grid">${groupCards}</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">Trigger Condition</label>
        <label class="always-toggle">
          <input type="checkbox" id="modal-always"${isAlways ? " checked" : ""} onchange="toggleAlways()">
          <span class="always-toggle-label">Always applies to every request</span>
        </label>
        <div id="cond-section"${isAlways ? ' style="display:none"' : ""}>
          <div class="cond-rows-wrap" id="cond-rows-wrap"></div>
          <button class="add-cond-btn" onclick="addConditionRow()" id="add-cond-btn">＋ Add condition (AND)</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRuleModal()">Cancel</button>
      <button class="btn btn-approve" onclick="saveRuleFromModal()">Save Rule</button>
    </div>`;

  renderConditionRows();
  document.getElementById("rule-modal").style.display = "";
}

function closeRuleModal() {
  document.getElementById("rule-modal").style.display = "none";
  _pendingStageId   = null;
  _pendingBlockType = null;
}

function handleModalBackdrop(e) {
  if (e.target === document.getElementById("rule-modal")) closeRuleModal();
}

function selectGroup(g) {
  document.querySelectorAll(".group-radio-card").forEach(el => {
    el.classList.toggle("selected", parseInt(el.querySelector("input").value) === g);
    if (parseInt(el.querySelector("input").value) === g)
      el.querySelector("input").checked = true;
  });
}

function toggleAlways() {
  const cb = document.getElementById("modal-always");
  const section = document.getElementById("cond-section");
  if (!cb || !section) return;
  section.style.display = cb.checked ? "none" : "";
}

function condToRows(rule) {
  if (!rule || rule.always) return [{ field: "spend_amount_gt", value: 10000 }];
  const c = rule.condition || {};
  const rows = [];
  if (c.spend_amount_gt != null) rows.push({ field: "spend_amount_gt", value: c.spend_amount_gt });
  if (c.category)      rows.push({ field: "category",        value: [].concat(c.category) });
  if (c.data_access)   rows.push({ field: "data_access",     value: [].concat(c.data_access) });
  if (c.geography)     rows.push({ field: "geography",       value: [].concat(c.geography)[0] });
  if (c.is_new_supplier) rows.push({ field: "is_new_supplier", value: true });
  return rows.length ? rows : [{ field: "spend_amount_gt", value: 10000 }];
}

function renderConditionRows() {
  const wrap = document.getElementById("cond-rows-wrap");
  const addBtn = document.getElementById("add-cond-btn");
  if (!wrap) return;

  wrap.innerHTML = _condRows.map((row, i) => {
    const fieldOpts = COND_FIELDS.map(f =>
      `<option value="${f.value}"${f.value === row.field ? " selected" : ""}>${f.label}</option>`
    ).join("");

    let valueHtml = "";
    if (row.field === "spend_amount_gt") {
      valueHtml = `<div class="cond-field-row">
        <span class="cond-label">£</span>
        <input id="cv-${i}" type="number" class="cond-num-input" min="0" step="1000"
          value="${row.value ?? 10000}" oninput="updateCondVal(${i}, parseFloat(this.value)||0)">
      </div>`;
    } else if (row.field === "is_new_supplier") {
      valueHtml = `<div style="font-size:0.78rem;color:#718096;padding:0.2rem 0">= Yes (new supplier only)</div>`;
    } else if (row.field === "geography") {
      const opts = (FIELD_OPTIONS.geography || []).map(v =>
        `<option value="${v}"${v === row.value ? " selected" : ""}>${v}</option>`).join("");
      valueHtml = `<select id="cv-${i}" class="cond-select"
        onchange="updateCondVal(${i}, this.value)">${opts}</select>`;
    } else {
      const opts = FIELD_OPTIONS[row.field] || [];
      const curVals = Array.isArray(row.value) ? row.value : (row.value ? [row.value] : []);
      const checks = opts.map(v => {
        const lbl = v.replace(/_/g," ");
        return `<label><input type="checkbox" value="${v}"${curVals.includes(v) ? " checked" : ""}
          onchange="updateCondChecks(${i}, '${row.field}')">${lbl}</label>`;
      }).join("");
      valueHtml = `<div class="cond-checkbox-group" id="cv-${i}">${checks}</div>`;
    }

    const andLabel = i > 0 ? `<div class="and-divider">AND</div>` : "";
    return `
      ${andLabel}
      <div class="cond-row">
        <div class="cond-row-left">
          <div class="cond-field-row">
            <span class="cond-label">Field</span>
            <select class="cond-select" onchange="onCondFieldChange(${i}, this.value)">${fieldOpts}</select>
          </div>
          ${valueHtml}
        </div>
        ${_condRows.length > 1
          ? `<button class="cond-remove" title="Remove" onclick="removeConditionRow(${i})">✕</button>`
          : ""}
      </div>`;
  }).join("");

  if (addBtn) addBtn.style.display = _condRows.length >= 3 ? "none" : "";
}

function addConditionRow() {
  if (_condRows.length >= 3) return;
  // Pick a field not already used
  const used = new Set(_condRows.map(r => r.field));
  const next = COND_FIELDS.find(f => !used.has(f.value)) || COND_FIELDS[0];
  _condRows.push({ field: next.value, value: next.value === "spend_amount_gt" ? 10000 : [] });
  renderConditionRows();
}

function removeConditionRow(i) {
  _condRows.splice(i, 1);
  renderConditionRows();
}

function onCondFieldChange(i, field) {
  const defaults = { spend_amount_gt: 10000, is_new_supplier: true, geography: "UK" };
  _condRows[i] = { field, value: defaults[field] ?? [] };
  renderConditionRows();
}

function updateCondVal(i, val) {
  _condRows[i].value = val;
}

function updateCondChecks(i, field) {
  const checked = [...document.querySelectorAll(`#cv-${i} input:checked`)].map(cb => cb.value);
  _condRows[i].value = checked;
}

function saveRuleFromModal() {
  const role  = document.getElementById("modal-role")?.value;
  const group = parseInt(document.querySelector('input[name="modal-group"]:checked')?.value);
  const always = document.getElementById("modal-always")?.checked;

  if (!role || !group) { alert("Please select a role and group."); return; }

  let rulePayload;
  if (always) {
    rulePayload = { role, sequence_group: group, always: true };
  } else {
    const condition = {};
    _condRows.forEach((row, i) => {
      if (row.field === "spend_amount_gt") {
        const n = parseFloat(document.getElementById(`cv-${i}`)?.value ?? row.value);
        if (!isNaN(n)) condition.spend_amount_gt = n;
      } else if (row.field === "is_new_supplier") {
        condition.is_new_supplier = true;
      } else if (row.field === "geography") {
        const el = document.getElementById(`cv-${i}`);
        const v  = el ? el.value : (Array.isArray(row.value) ? row.value[0] : row.value);
        if (v) condition.geography = v;
      } else {
        const el = document.getElementById(`cv-${i}`);
        const checked = el
          ? [...el.querySelectorAll("input:checked")].map(cb => cb.value)
          : (Array.isArray(row.value) ? row.value : [row.value]).filter(Boolean);
        if (checked.length)
          condition[row.field] = checked.length === 1 ? checked[0] : checked;
      }
    });

    if (!Object.keys(condition).length) {
      alert("Add at least one condition, or check 'Always applies'.");
      return;
    }
    rulePayload = { role, sequence_group: group, condition };
  }

  const rules = [...(getActiveFlow()?.approval_rules || [])];
  if (_editIndex !== null) rules[_editIndex] = rulePayload;
  else rules.push(rulePayload);

  _updateActiveFlow({ approval_rules: rules });
  closeRuleModal();
  renderWorkflowBuilder();
}

// ── Apply flow to a request ───────────────────────────────────────────────────

function _pickFlowCard(flowId) {
  document.querySelectorAll(".apply-flow-card").forEach(el => {
    const match = el.querySelector("input").value === flowId;
    el.classList.toggle("selected", match);
    el.querySelector("input").checked = match;
  });
}

async function openApplyFlowModal(requestId) {
  // Load workflow config on demand if not already in memory
  if (!_wfConfig) {
    try {
      const r = await fetch(`${API_BASE}/workflow-config`);
      _wfConfig = await r.json();
      if (!_wfConfig.flows) {
        _wfConfig.flows = [{
          id: "default", name: "Default", trigger: null,
          stages: _wfConfig.stages || [{ id: 1, name: "Initial Gate" }],
          approval_rules: _wfConfig.approval_rules || [],
        }];
      }
      _activeFlowId = _wfConfig.flows[0]?.id || "default";
    } catch (e) {
      alert("Could not load workflow config: " + e.message);
      return;
    }
  }

  const flows = (_wfConfig?.flows || []);
  if (!flows.length) {
    alert("No flows configured. Go to Workflow Rules and create at least one flow.");
    return;
  }

  const cards = flows.map((f, i) => {
    const trigger = f.trigger;
    const badge = trigger
      ? `<span style="font-size:0.65rem;color:#7B8FFF;background:#EEF2FF;border-radius:3px;padding:0.05rem 0.35rem;margin-left:0.3rem">${[].concat(trigger.category||[]).join(", ") || "custom trigger"}</span>`
      : `<span style="font-size:0.65rem;color:#A0AEC0;background:#F0F2F8;border-radius:3px;padding:0.05rem 0.35rem;margin-left:0.3rem">fallback</span>`;
    const stageCount = (f.stages||[]).length;
    const ruleCount  = (f.approval_rules||[]).filter(r=>(r.type||"approval")==="approval").length;
    return `
      <label class="group-radio-card apply-flow-card${i===0?' selected':''}" onclick="_pickFlowCard('${esc(f.id)}')" style="max-width:none;flex:1 1 100%;cursor:pointer">
        <input type="radio" name="apply-flow-radio" value="${esc(f.id)}"${i===0?' checked':''} style="display:none">
        <div style="display:flex;align-items:center;gap:0.3rem;margin-bottom:0.2rem">
          <span class="group-radio-name">${esc(f.name)}</span>${badge}
        </div>
        <div style="font-size:0.65rem;color:#A0AEC0">${stageCount} stage${stageCount!==1?'s':''} · ${ruleCount} approval${ruleCount!==1?'s':''}</div>
      </label>`;
  }).join("");

  document.getElementById("rule-modal-box").innerHTML = `
    <div class="modal-hdr">
      <div class="modal-title">⇄ Change Flow</div>
      <div class="modal-subtitle">Select a flow to apply. Existing approval steps will be replaced and the clock restarts.</div>
    </div>
    <div class="modal-body">
      <div class="modal-field">
        <label class="modal-label">Choose a flow</label>
        <div class="group-radio-grid" style="flex-direction:column">${cards}</div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeRuleModal()">Cancel</button>
      <button class="btn btn-approve" onclick="applyFlow('${esc(requestId)}')">Apply Flow</button>
    </div>`;
  document.getElementById("rule-modal").style.display = "";
}

async function applyFlow(requestId) {
  const btn = document.querySelector('#rule-modal-box .btn-approve');
  const flowId = document.querySelector('input[name="apply-flow-radio"]:checked')?.value;
  if (!flowId) { alert("Select a flow first."); return; }
  if (btn) { btn.disabled = true; btn.textContent = "Applying…"; }
  try {
    const r = await fetch(`${API_BASE}/requests/${requestId}/apply-flow`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ flow_id: flowId }),
    });
    if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || r.status);
    closeRuleModal();
    await loadRequests();
  } catch (e) {
    if (btn) { btn.disabled = false; btn.textContent = "Apply Flow"; }
    alert(`Failed to apply flow: ${e.message}`);
  }
}

function deleteRule(index) {
  const flow  = getActiveFlow();
  const rule  = flow?.approval_rules[index];
  const label = getRoleById(rule?.role)?.name || ROLE_DISPLAY[rule?.role] || rule?.role || "this rule";
  if (!confirm(`Delete the ${label} rule?`)) return;
  _updateActiveFlow({ approval_rules: (flow?.approval_rules || []).filter((_, i) => i !== index) });
  renderWorkflowBuilder();
}
</script>
