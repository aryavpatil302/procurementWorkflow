<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnea — Approval Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: #F7F8FA; color: #1A202C; display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ─────────────────────────────────────────────────────────────── */
    .sidebar { width: 220px; background: #1E2333; color: #CBD5E0; flex-shrink: 0;
               display: flex; flex-direction: column; padding: 1.5rem 0; }
    .sidebar-logo { padding: 0 1.25rem 1.5rem; font-size: 1.1rem; font-weight: 700;
                    color: #fff; letter-spacing: 0.02em; }
    .sidebar-logo span { color: #7B8FFF; }
    .nav-section { padding: 0.5rem 1.25rem 0.25rem; font-size: 0.65rem; font-weight: 700;
                   text-transform: uppercase; letter-spacing: 0.1em; color: #4A5568; }
    .nav-item { display: flex; align-items: center; gap: 0.6rem; padding: 0.55rem 1.25rem;
                font-size: 0.875rem; cursor: pointer; transition: background 0.15s;
                border-left: 2px solid transparent; }
    .nav-item:hover { background: rgba(255,255,255,0.05); }
    .nav-item.active { background: rgba(123,143,255,0.15); color: #7B8FFF; border-left-color: #7B8FFF; }
    .nav-badge { margin-left: auto; background: #7B8FFF; color: #fff; border-radius: 99px;
                 padding: 0.1rem 0.45rem; font-size: 0.7rem; font-weight: 700; min-width: 1.2rem;
                 text-align: center; }

    /* ── Main content ────────────────────────────────────────────────────────── */
    .main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
    .topbar { background: #fff; border-bottom: 1px solid #E2E8F0; padding: 1rem 2rem;
              display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .topbar-title { font-size: 1.125rem; font-weight: 600; color: #1A202C; }
    .topbar-sub { font-size: 0.8rem; color: #718096; margin-top: 0.15rem; }
    .content { padding: 1.5rem 2rem; flex: 1; }

    /* ── Priority groups ─────────────────────────────────────────────────────── */
    .priority-group { margin-bottom: 1.75rem; }
    .priority-group-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.6rem; }
    .priority-dot { width: 8px; height: 8px; border-radius: 50%; }
    .priority-label-text { font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
                           letter-spacing: 0.07em; color: #4A5568; }

    /* ── Task table ──────────────────────────────────────────────────────────── */
    .task-table { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; overflow: hidden; }
    .task-row { display: grid;
                grid-template-columns: 1.75rem 2.25rem 1fr 1fr 1fr 7rem 5.5rem 4.5rem;
                align-items: center; padding: 0.7rem 1rem; border-bottom: 1px solid #F7F8FA;
                gap: 0.7rem; cursor: pointer; transition: background 0.1s; }
    .task-row:last-child { border-bottom: none; }
    .task-row:hover { background: #FAFBFF; }
    .task-row.header { background: #F7F8FA; border-bottom: 1px solid #E2E8F0; cursor: default;
                       font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
                       letter-spacing: 0.06em; color: #A0AEC0; }
    .task-row.header:hover { background: #F7F8FA; }
    .task-row-8col { grid-template-columns: 2.25rem 1fr 1fr 1fr 7rem 5.5rem 6rem; }

    /* ── Priority bars ───────────────────────────────────────────────────────── */
    .priority-bars { display: flex; gap: 2px; align-items: flex-end; height: 18px; }
    .priority-bar { width: 3px; border-radius: 2px; }

    /* ── Supplier avatar ─────────────────────────────────────────────────────── */
    .supplier-avatar { width: 2rem; height: 2rem; border-radius: 6px; display: flex;
                       align-items: center; justify-content: center; font-weight: 700;
                       font-size: 0.8rem; color: #fff; flex-shrink: 0; }

    /* ── Status badges ───────────────────────────────────────────────────────── */
    .status-badge { display: inline-flex; align-items: center; padding: 0.2rem 0.55rem;
                    border-radius: 99px; font-size: 0.72rem; font-weight: 600; white-space: nowrap; }
    .status-active    { background: #EBF8FF; color: #2B6CB0; }
    .status-approved  { background: #F0FFF4; color: #276749; }
    .status-rejected  { background: #FFF5F5; color: #C53030; }
    .status-escalated { background: #FFFAF0; color: #C05621; }
    .status-pending   { background: #F7F8FA; color: #718096; }
    .status-skipped   { background: #F7F8FA; color: #A0AEC0; }
    .status-in_review { background: #EBF8FF; color: #2B6CB0; }
    .status-cancelled { background: #F7F8FA; color: #A0AEC0; }

    /* ── Risk badge ──────────────────────────────────────────────────────────── */
    .risk-badge { display: inline-block; padding: 0.2rem 0.55rem; border-radius: 99px;
                  font-size: 0.72rem; font-weight: 700; }
    .risk-critical { background: #FFF5F5; color: #C53030; border: 1px solid #FEB2B2; }
    .risk-high     { background: #FFFAF0; color: #C05621; border: 1px solid #FBD38D; }
    .risk-medium   { background: #FFFFF0; color: #B7791F; border: 1px solid #FAF089; }
    .risk-low      { background: #F0FFF4; color: #276749; border: 1px solid #9AE6B4; }

    /* ── Detail view ─────────────────────────────────────────────────────────── */
    .detail-topbar { background: #fff; border-bottom: 1px solid #E2E8F0; padding: 0.75rem 2rem;
                     flex-shrink: 0; }
    .back-link { color: #7B8FFF; font-size: 0.85rem; cursor: pointer; display: inline-flex;
                 align-items: center; gap: 0.3rem; margin-bottom: 0.6rem; }
    .back-link:hover { text-decoration: underline; }
    .detail-title { font-size: 1.3rem; font-weight: 700; color: #1A202C; }
    .detail-subtitle { font-size: 0.85rem; color: #718096; margin-top: 0.3rem;
                       display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
    .detail-layout { display: grid; grid-template-columns: 260px 1fr; gap: 1.25rem;
                     padding: 1.25rem 2rem; flex: 1; overflow: hidden; }
    .meta-col { overflow-y: auto; }
    .main-col { overflow-y: auto; }

    /* Metadata cards */
    .meta-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px;
                 padding: 1rem; margin-bottom: 1rem; }
    .meta-section-title { font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
                          letter-spacing: 0.08em; color: #A0AEC0; margin-bottom: 0.75rem; }
    .meta-field { margin-bottom: 0.55rem; }
    .meta-label { font-size: 0.7rem; color: #A0AEC0; margin-bottom: 0.1rem; }
    .meta-value { font-size: 0.85rem; font-weight: 500; color: #2D3748; }
    .flag-tag { display: inline-block; background: #FFF5F5; color: #C53030;
                border: 1px solid #FEB2B2; border-radius: 4px; padding: 0.1rem 0.4rem;
                font-size: 0.68rem; margin: 0.15rem 0.1rem; }

    /* Urgency banners */
    .urgency-banner { border-radius: 6px; padding: 0.55rem 0.85rem; font-size: 0.8rem;
                      display: flex; align-items: center; gap: 0.45rem; margin-bottom: 0.75rem; }
    .urgency-overdue { background: #FFF5F5; border: 1px solid #FC8181; color: #C53030; }
    .urgency-due-soon { background: #FFFAF0; border: 1px solid #F6AD55; color: #C05621; }

    /* Timeline */
    .timeline-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px;
                     padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .timeline-heading { font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
                        letter-spacing: 0.07em; color: #A0AEC0; margin-bottom: 1rem; }
    /* Approval timeline — now SVG-rendered; only the card shell needs CSS */
    .timeline-step-name { font-weight: 600; color: #2D3748; }
    .timeline-step-date { color: #A0AEC0; }

    /* Step cards */
    .step-card { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px;
                 overflow: hidden; margin-bottom: 0.875rem; }
    .step-card-header { padding: 0.7rem 1rem; background: #F7F8FA;
                        border-bottom: 1px solid #E2E8F0; display: flex;
                        align-items: center; justify-content: space-between; }
    .step-card-header.is-active { background: #EBF8FF; }
    .step-card-role { font-weight: 600; font-size: 0.875rem; color: #2D3748; }
    .step-card-approver { font-size: 0.775rem; color: #718096; margin-top: 0.1rem; }
    .step-card-body { padding: 1rem; }
    .ai-label { font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
                letter-spacing: 0.07em; color: #A0AEC0; margin-bottom: 0.45rem;
                display: flex; align-items: center; gap: 0.3rem; }
    .ai-label::before { content: "✦"; color: #7B8FFF; font-size: 0.65rem; }
    .ai-bullets { list-style: none; padding: 0; margin: 0 0 0.875rem; }
    .ai-bullets li { font-size: 0.845rem; color: #4A5568; padding: 0.2rem 0 0.2rem 1.1rem;
                     position: relative; line-height: 1.55; }
    .ai-bullets li::before { content: "·"; position: absolute; left: 0.3rem;
                              color: #7B8FFF; font-weight: 700; font-size: 1rem; top: 0.05rem; }
    .decision-note { background: #F7F8FA; border-left: 3px solid #CBD5E0; border-radius: 0 4px 4px 0;
                     padding: 0.5rem 0.75rem; font-size: 0.8rem; color: #4A5568; margin-top: 0.75rem; }

    /* Action buttons */
    .action-bar { display: flex; gap: 0.65rem; flex-wrap: wrap; padding-top: 0.5rem; }
    .btn { padding: 0.45rem 1.1rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
           cursor: pointer; border: none; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.85; }
    .btn-approve  { background: #276749; color: #fff; }
    .btn-reject   { background: #fff; color: #C53030; border: 1px solid #FC8181; }
    .btn-escalate { background: #fff; color: #C05621; border: 1px solid #F6AD55; }
    .btn-outline  { background: #fff; color: #4A5568; border: 1px solid #CBD5E0; }

    /* Misc */
    .empty-state { text-align: center; padding: 4rem 2rem; color: #A0AEC0; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    .empty-title { font-size: 0.95rem; font-weight: 600; color: #718096; margin-bottom: 0.4rem; }
    .loading-state { color: #A0AEC0; font-size: 0.9rem; padding: 2rem; text-align: center; }
    .error-banner { background: #FFF5F5; border: 1px solid #FC8181; color: #C53030;
                    padding: 0.75rem 1rem; border-radius: 6px; font-size: 0.875rem; margin-bottom: 1rem; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 3px; }

    /* ── Source data section inside step cards ─── */
    .source-section { margin-bottom: 0.875rem; }
    .source-section-hdr {
      font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em;
      color: #A0AEC0; margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.35rem; cursor: pointer;
    }
    .source-section-hdr::before { content: "▸"; font-size: 0.6rem; transition: transform 0.15s; }
    .source-section-hdr.open::before { transform: rotate(90deg); }
    .source-data-body {
      background: #FAFBFF; border: 1px solid #EEF2FF; border-radius: 7px; padding: 0.65rem 0.875rem;
    }
    .source-row {
      display: grid; grid-template-columns: 130px 1fr; gap: 0.4rem 0.75rem;
      padding: 0.3rem 0; border-bottom: 1px solid #F1F5F9; align-items: baseline;
    }
    .source-row:last-child { border-bottom: none; }
    .source-row.full-width { grid-template-columns: 1fr; }
    .source-label { font-size: 0.72rem; color: #94a3b8; font-weight: 500; }
    .source-value { font-size: 0.82rem; color: #2D3748; font-weight: 500; }
    .source-value-muted { color: #718096 !important; font-style: italic; }

    /* ── Decision record on completed step cards ─── */
    .decision-record {
      display: flex; align-items: center; gap: 0.6rem;
      background: #F7F8FA; border-radius: 7px; padding: 0.65rem 0.875rem;
      margin-bottom: 0.875rem; font-size: 0.84rem;
    }
    .decision-record-icon { font-size: 1.1rem; flex-shrink: 0; }
    .decision-record-text { flex: 1; }
    .decision-record-text strong { font-weight: 700; }
    .decision-record-time { font-size: 0.72rem; color: #A0AEC0; margin-top: 2px; }

    /* ── Peer context bar ─── */
    .peer-bar {
      background: #F0F4FF; border: 1px solid #E0E7FF; border-radius: 7px;
      padding: 0.5rem 0.875rem; margin-bottom: 0.875rem;
      font-size: 0.78rem; color: #4338CA; display: flex; align-items: flex-start; gap: 0.5rem;
    }

    /* ── Dynamic task-row status badges (different from step status) ─── */
    .task-status-not-started { background: #F7F8FA; color: #718096; border: 1px solid #E2E8F0; }
    .task-status-in-progress { background: #EBF4FF; color: #3182CE; border: 1px solid #BEE3F8; }
    .task-status-overdue      { background: #FFF5F5; color: #C53030; border: 1px solid #FEB2B2; }

    /* ── Summary preview line in task rows ─── */
    .task-summary-preview {
      font-size: 0.72rem; color: #A0AEC0; margin-top: 0.15rem;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 380px;
    }

    /* ── Task list filter tabs ─── */
    .filter-tabs { display: flex; gap: 0; border-bottom: 1px solid #E2E8F0;
                   background: #fff; padding: 0 2rem; margin-bottom: 0; flex-shrink: 0; }
    .filter-tab { padding: 10px 18px; font-size: 0.82rem; font-weight: 600; cursor: pointer;
                  color: #718096; border-bottom: 2px solid transparent; transition: all 0.15s; }
    .filter-tab:hover { color: #4A5568; }
    .filter-tab.active { color: #7B8FFF; border-bottom-color: #7B8FFF; }
    .filter-tab-count { background: #EDF2FF; color: #7B8FFF; border-radius: 99px;
                        padding: 1px 7px; font-size: 0.7rem; margin-left: 5px; }

    /* ── Persona switcher ─── */
    .persona-bar { background: #FAFBFF; border-bottom: 1px solid #E2E8F0; padding: 0.55rem 2rem;
                   display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }
    .persona-bar-label { font-size: 0.78rem; font-weight: 600; color: #4A5568; white-space: nowrap; }
    .persona-select { font-size: 0.82rem; padding: 0.3rem 0.65rem; border: 1px solid #E2E8F0;
                      border-radius: 6px; background: #fff; color: #2D3748; cursor: pointer;
                      outline: none; min-width: 220px; }
    .persona-select:focus { border-color: #7B8FFF; box-shadow: 0 0 0 2px rgba(123,143,255,.15); }
    .task-row.blocked { opacity: 0.45; cursor: default; }
    .task-row.blocked:hover { background: #fff; }
    .waiting-badge { background: #F7F8FA; color: #718096; border: 1px solid #E2E8F0;
                     font-size: 0.7rem; padding: 0.18rem 0.5rem; border-radius: 99px; white-space: nowrap; }

    /* ── Requester view ─── */
    .req-hero { background: linear-gradient(135deg, #1E2333 0%, #2d3a5c 100%);
                color: white; padding: 1.25rem 2rem; flex-shrink: 0; }
    .req-hero-back { color: #7B8FFF; font-size: 0.82rem; cursor: pointer;
                     margin-bottom: 0.6rem; display: inline-block; }
    .req-hero-back:hover { text-decoration: underline; }
    .req-hero-title { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.01em; margin-bottom: 0.3rem; }
    .req-hero-sub { font-size: 0.85rem; color: #94a3b8; display: flex; gap: 0.5rem;
                    flex-wrap: wrap; align-items: center; }
    .req-hero-link { font-size: 0.75rem; background: rgba(123,143,255,0.2); color: #a5b4fc;
                     border: 1px solid rgba(123,143,255,0.4); border-radius: 4px;
                     padding: 2px 8px; cursor: pointer; text-decoration: none; }
    .req-hero-link:hover { background: rgba(123,143,255,0.35); }

    .req-layout { display: grid; grid-template-columns: 260px 1fr; gap: 1.25rem;
                  padding: 1.25rem 2rem; flex: 1; overflow: hidden; }

    /* Current status banner */
    .req-status-banner { border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 1rem;
                         display: flex; gap: 0.75rem; align-items: flex-start; }
    .req-status-approved { background: #F0FFF4; border: 1px solid #9AE6B4; }
    .req-status-rejected  { background: #FFF5F5; border: 1px solid #FEB2B2; }
    .req-status-active    { background: #EBF8FF; border: 1px solid #BEE3F8; }
    .req-status-icon  { font-size: 1.3rem; flex-shrink: 0; }
    .req-status-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 3px; }
    .req-status-body  { font-size: 0.82rem; color: #4A5568; line-height: 1.5; }
    .req-status-approved .req-status-title { color: #276749; }
    .req-status-rejected  .req-status-title { color: #C53030; }
    .req-status-active    .req-status-title { color: #2B6CB0; }

    /* Group cards in requester view */
    .req-group { background: white; border: 1px solid #E2E8F0; border-radius: 8px;
                 overflow: hidden; margin-bottom: 0.875rem; }
    .req-group-hdr { display: flex; align-items: center; justify-content: space-between;
                     padding: 0.6rem 1rem; border-bottom: 1px solid #E2E8F0; }
    .req-group-hdr-done { background: #F0FFF4; }
    .req-group-hdr-active { background: #EBF8FF; }
    .req-group-hdr-waiting { background: #F7F8FA; }
    .req-group-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
                       letter-spacing: 0.07em; }
    .req-group-label-done    { color: #276749; }
    .req-group-label-active  { color: #2B6CB0; }
    .req-group-label-waiting { color: #718096; }
    .req-step-row { display: flex; align-items: center; gap: 0.75rem;
                    padding: 0.65rem 1rem; border-bottom: 1px solid #F7F8FA; }
    .req-step-row:last-child { border-bottom: none; }
    .req-step-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .req-step-info { flex: 1; min-width: 0; }
    .req-step-name   { font-size: 0.875rem; font-weight: 600; color: #2D3748; }
    .req-step-person { font-size: 0.775rem; color: #718096; margin-top: 1px; }
    .req-step-right  { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; }
    .req-step-date   { font-size: 0.72rem; color: #A0AEC0; }

    /* ── Workflow Builder ─────────────────────────────────────────── */

    /* Role chips */
    .wf-role-chip { display: inline-flex; align-items: center; padding: 0.2rem 0.6rem;
                    border-radius: 99px; font-size: 0.72rem; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .wf-chip-manager     { background: #EEF2FF; color: #4338CA; }
    .wf-chip-finance     { background: #F0FFF4; color: #276749; }
    .wf-chip-it_security { background: #FFFAF0; color: #C05621; }
    .wf-chip-legal       { background: #EBF8FF; color: #2B6CB0; }
    .wf-chip-dpo         { background: #FAF5FF; color: #6B21A8; }
    .wf-chip-cfo         { background: #FFF5F5; color: #C53030; }
    .wf-chip-director    { background: #FFF8F0; color: #9A3412; }
    .wf-chip-fpa         { background: #F0FDF4; color: #166534; }
    .wf-chip-ceo         { background: #1E2333; color: #E2E8F0; }
    .wf-chip-custom      { /* color set inline from palette */ }
    .toolbox-role-item   { position: relative; }
    .toolbox-role-edit   { display: none; position: absolute; right: 0.3rem; top: 50%;
                           transform: translateY(-50%); background: none; border: none;
                           color: #A0AEC0; cursor: pointer; font-size: 0.72rem; padding: 0.1rem; }
    .toolbox-role-item:hover .toolbox-role-edit { display: block; }
    .role-person-row     { display: flex; gap: 0.4rem; align-items: center; }

    /* Page shell */
    .wf-canvas-page { display: flex; height: calc(100vh - 111px); overflow: hidden; }

    /* Toolbox sidebar */
    .wf-sidebar { width: 220px; flex-shrink: 0; background: #fff;
                  border-right: 1px solid #E2E8F0; display: flex; flex-direction: column; overflow: hidden; }
    .toolbox-tabs { display: flex; border-bottom: 1px solid #E2E8F0; flex-shrink: 0; }
    .toolbox-tab { flex: 1; padding: 0.6rem 0; font-size: 0.78rem; font-weight: 700;
                   text-align: center; cursor: pointer; color: #718096;
                   border-bottom: 2px solid transparent; transition: all 0.15s; }
    .toolbox-tab.active { color: #1A202C; border-bottom-color: #1A202C; }
    .toolbox-tab.dim { color: #CBD5E0; cursor: default; }
    .toolbox-body { flex: 1; overflow-y: auto; padding: 0.875rem; }
    .toolbox-section { margin-bottom: 1.25rem; }
    .toolbox-section-hdr { font-size: 0.62rem; font-weight: 800; text-transform: uppercase;
                           letter-spacing: 0.09em; color: #A0AEC0; margin-bottom: 0.5rem;
                           display: flex; align-items: center; justify-content: space-between; }
    .toolbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0.3rem; }
    .toolbox-grid.single { grid-template-columns: 1fr; }
    .toolbox-item { display: flex; align-items: center; gap: 0.35rem; padding: 0.4rem 0.6rem;
                    border: 1.5px solid #E2E8F0; border-radius: 6px; font-size: 0.71rem;
                    font-weight: 500; color: #4A5568; cursor: pointer; background: #fff;
                    transition: all 0.15s; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .toolbox-item:hover { border-color: #7B8FFF; color: #4338CA; background: #FAFBFF; }
    .toolbox-item-icon { flex-shrink: 0; font-size: 0.8rem; }

    /* Template section at bottom of sidebar */
    .tpl-section-hdr { font-size: 0.62rem; font-weight: 800; text-transform: uppercase;

    .flow-tpl-roles { display: flex; flex-wrap: wrap; gap: 0.25rem; margin: 0.3rem 0 0.55rem; }
    .flow-tpl-role { font-size: 0.6rem; font-weight: 600; padding: 0.1rem 0.4rem;
                     border-radius: 10px; background: #EDF2F7; color: #4A5568; }
    .flow-tpl-load { font-size: 0.67rem; color: #7B8FFF; font-weight: 600; cursor: pointer;
                     background: none; border: none; padding: 0; }
    .flow-tpl-load:hover { text-decoration: underline; }
    .tpl-card { border: 1.5px solid #E2E8F0; border-radius: 7px; padding: 0.6rem 0.7rem;
                margin-bottom: 0.4rem; cursor: pointer; transition: all 0.15s; }
    .tpl-card:hover { border-color: #7B8FFF; background: #FAFBFF; }
    .tpl-card-name { font-size: 0.78rem; font-weight: 700; color: #2D3748; margin-bottom: 0.15rem; }
    .tpl-card-meta { font-size: 0.66rem; color: #A0AEC0; }

    /* Canvas area */
    .wf-canvas-area { flex: 1; overflow: auto; background: #F0F2F8; position: relative; }

    /* Horizontal flow */
    .canvas-flow-h { display: flex; flex-direction: row; align-items: center;
                     gap: 40px; padding: 2.5rem 2rem; min-width: fit-content; min-height: 220px; }

    /* Step column — single stack by default, wraps to 2 cols when .wide */
    .canvas-step-col { display: flex; flex-direction: column; gap: 0.45rem; align-items: center; }
    .canvas-step-col.wide { flex-direction: row; flex-wrap: wrap; justify-content: center;
                            gap: 0.45rem; max-width: 308px; }
    .canvas-group-tag { display: flex; align-items: center; gap: 0.3rem;
                        background: #fff; border: 1px solid #E2E8F0; border-radius: 4px;
                        padding: 0.15rem 0.4rem 0.15rem 0.6rem;
                        width: 100%; margin-bottom: 0.1rem; }
    .stage-name-input { flex: 1; min-width: 0; background: none; border: none;
                        border-bottom: 1px dashed transparent; font-size: 0.58rem;
                        font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em;
                        color: #718096; cursor: text; padding: 0; }
    .stage-name-input:hover { border-bottom-color: #CBD5E0; }
    .stage-name-input:focus { outline: none; border-bottom-color: #6366F1; }
    .stage-delete-btn { flex-shrink: 0; background: none; border: none; color: #D1D5DB;
                        cursor: pointer; font-size: 0.95rem; padding: 0; line-height: 1;
                        transition: color 0.15s; }
    .stage-delete-btn:hover { color: #EF4444; }
    .canvas-add-stage { display: flex; flex-direction: column; align-items: center;
                        justify-content: center; width: 56px; min-height: 90px;
                        border: 2px dashed #CBD5E0; border-radius: 10px; flex-shrink: 0;
                        cursor: pointer; color: #A0AEC0; font-size: 0.6rem; gap: 0.2rem;
                        background: none; transition: all 0.15s; letter-spacing: 0.04em; }
    .canvas-add-stage:hover { border-color: #7B8FFF; color: #7B8FFF; background: #FAFBFF; }
    .canvas-add-stage-plus { font-size: 1.3rem; line-height: 1; font-weight: 300; }
    /* Insert-stage button (sits between stage columns, excluded from connector logic) */
    .canvas-insert-btn { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #CBD5E0;
                         background: #fff; color: #A0AEC0; font-size: 0.85rem; line-height: 1;
                         cursor: pointer; display: flex; align-items: center; justify-content: center;
                         flex-shrink: 0; transition: all 0.15s; z-index: 5; padding: 0; }
    .canvas-insert-btn:hover { border-color: #7B8FFF; color: #7B8FFF; background: #EEF2FF;
                               transform: scale(1.15); }
    /* Drag and drop */
    .toolbox-item[draggable="true"] { cursor: grab; }
    .toolbox-item[draggable="true"]:active { cursor: grabbing; }
    .canvas-block[draggable="true"] { cursor: grab; }
    .canvas-block[draggable="true"]:active { cursor: grabbing; }
    .canvas-step-col.drag-over { outline: 2px dashed #7B8FFF; outline-offset: 4px;
                                  background: rgba(123,143,255,0.04); border-radius: 10px; }
    .canvas-add-stage.drag-over { border-color: #7B8FFF; color: #7B8FFF; background: #EEF2FF; }

    /* Terminal nodes */
    .canvas-terminal { display: flex; align-items: center; gap: 0.5rem; background: #1E2333;
                       color: #E2E8F0; border-radius: 99px; padding: 0.45rem 1.1rem;
                       font-size: 0.72rem; font-weight: 700; letter-spacing: 0.04em;
                       white-space: nowrap; flex-shrink: 0; }
    .canvas-terminal-end { background: #276749; color: #fff; }

    /* Compact blocks — 148px wide, reduced padding */
    .canvas-block { background: #fff; border: 2px solid #E2E8F0; border-radius: 8px;
                    padding: 0.55rem 0.65rem 0.45rem; width: 148px; cursor: pointer;
                    transition: all 0.15s; flex-shrink: 0; }
    .canvas-block:hover { border-color: #7B8FFF; box-shadow: 0 2px 10px rgba(123,143,255,0.13); }
    .canvas-block-sub  { font-size: 0.63rem; color: #A0AEC0; margin: 0.15rem 0 0.3rem;
                         white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .canvas-block-cond { font-size: 0.63rem; color: #4A5568; background: #F7F8FA;
                         border-radius: 4px; padding: 0.18rem 0.35rem; line-height: 1.4;
                         white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .canvas-block-btns { display: flex; gap: 0.25rem; margin-top: 0.35rem; }
    .canvas-block-btn  { font-size: 0.6rem; padding: 0.12rem 0.35rem; border-radius: 3px;
                         border: 1px solid #E2E8F0; background: #fff; color: #718096; cursor: pointer; }
    .canvas-block-btn:hover     { border-color: #7B8FFF; color: #7B8FFF; }
    .canvas-block-btn.del:hover { border-color: #FC8181; color: #C53030; }

    /* Block type variants */
    .cb-task             { background: #FFFBEB; border-color: #FDE68A; }
    .cb-task:hover       { border-color: #F59E0B !important; }
    .cb-notify           { background: #EBF8FF; border-color: #93C5FD; }
    .cb-notify:hover     { border-color: #3B82F6 !important; }
    .cb-milestone        { background: #1E2333; border-color: #1E2333; color: #fff; }
    .cb-milestone:hover  { border-color: #4338CA !important; }
    .cb-create_agreement { background: #F0FFF4; border-color: #9AE6B4; }
    .cb-create_agreement:hover { border-color: #38A169 !important; }
    .cb-create_po        { background: #FAF5FF; border-color: #D9B2FF; }
    .cb-create_po:hover  { border-color: #7C3AED !important; }
    .cb-rfx              { background: #FFF7ED; border-color: #FBD38D; }
    .cb-rfx:hover        { border-color: #D97706 !important; }

    /* Empty slot */
    .canvas-empty-slot { width: 148px; border: 2px dashed #CBD5E0; border-radius: 8px;
                         padding: 1rem 0.5rem; text-align: center; font-size: 0.7rem;
                         color: #A0AEC0; cursor: pointer; transition: all 0.15s; line-height: 1.6; }
    .canvas-empty-slot:hover { border-color: #7B8FFF; color: #7B8FFF; background: #FAFBFF; }

    /* Action label modal */
    .modal-input { width: 100%; padding: 0.45rem 0.65rem; border: 1px solid #CBD5E0;
                   border-radius: 6px; font-size: 0.875rem; color: #2D3748; }
    .modal-input:focus { outline: none; border-color: #7B8FFF; }

    /* ── Rule modal ─── */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45);
                     z-index: 1000; display: flex; align-items: center; justify-content: center; }
    .modal-box { background: #fff; border-radius: 10px; width: 540px; max-width: 95vw;
                 max-height: 88vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .modal-hdr { padding: 1.25rem 1.5rem 0; }
    .modal-title { font-size: 1rem; font-weight: 700; color: #1A202C; margin-bottom: 0.2rem; }
    .modal-subtitle { font-size: 0.78rem; color: #718096; }
    .modal-body { padding: 1.25rem 1.5rem; }
    .modal-field { margin-bottom: 1rem; }
    .modal-label { font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
                   letter-spacing: 0.06em; color: #718096; margin-bottom: 0.4rem; display: block; }
    .modal-select { width: 100%; padding: 0.45rem 0.65rem; border: 1px solid #CBD5E0;
                    border-radius: 6px; font-size: 0.875rem; color: #2D3748;
                    background: #fff; appearance: none; cursor: pointer; }
    .modal-select:focus { outline: none; border-color: #7B8FFF; }
    .group-radio-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .group-radio-card { border: 1.5px solid #E2E8F0; border-radius: 7px; padding: 0.5rem 0.65rem;
                        cursor: pointer; transition: all 0.15s; text-align: center;
                        flex: 1 1 80px; min-width: 80px; max-width: 150px; }
    .group-radio-card:hover { border-color: #7B8FFF; background: #FAFBFF; }
    .group-radio-card.selected { border-color: #7B8FFF; background: #EEF2FF; }
    .group-radio-card input { display: none; }
    .group-radio-name { font-size: 0.7rem; font-weight: 600; color: #4A5568; }
    .always-toggle { display: flex; align-items: center; gap: 0.6rem; padding: 0.65rem 0.875rem;
                     background: #F7F8FA; border: 1px solid #E2E8F0; border-radius: 7px;
                     cursor: pointer; margin-bottom: 0.875rem; }
    .always-toggle input { width: 16px; height: 16px; cursor: pointer; accent-color: #7B8FFF; }
    .always-toggle-label { font-size: 0.84rem; color: #2D3748; font-weight: 500; }
    .cond-rows-wrap { display: flex; flex-direction: column; gap: 0.5rem; }
    .cond-row { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem; align-items: start;
                background: #F7F8FA; border: 1px solid #E2E8F0; border-radius: 7px; padding: 0.65rem 0.75rem; }
    .cond-row-left { display: flex; flex-direction: column; gap: 0.4rem; }
    .cond-field-row { display: flex; align-items: center; gap: 0.5rem; }
    .cond-label { font-size: 0.68rem; color: #A0AEC0; font-weight: 600;
                  text-transform: uppercase; letter-spacing: 0.05em; }
    .cond-select { padding: 0.35rem 0.55rem; border: 1px solid #CBD5E0; border-radius: 5px;
                   font-size: 0.82rem; color: #2D3748; background: #fff; cursor: pointer; }
    .cond-num-input { width: 110px; padding: 0.35rem 0.55rem; border: 1px solid #CBD5E0;
                      border-radius: 5px; font-size: 0.82rem; color: #2D3748; }
    .cond-checkbox-group { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.3rem; }
    .cond-checkbox-group label { display: flex; align-items: center; gap: 0.3rem;
                                  font-size: 0.78rem; color: #4A5568; cursor: pointer;
                                  background: #fff; border: 1px solid #E2E8F0;
                                  border-radius: 4px; padding: 0.2rem 0.5rem; }
    .cond-checkbox-group input { accent-color: #7B8FFF; }
    .cond-remove { background: none; border: none; color: #A0AEC0; font-size: 1rem;
                   cursor: pointer; padding: 0.1rem 0.3rem; align-self: flex-start; }
    .cond-remove:hover { color: #C53030; }
    .add-cond-btn { font-size: 0.78rem; color: #7B8FFF; background: none; border: none;
                    cursor: pointer; padding: 0.3rem 0; display: inline-flex;
                    align-items: center; gap: 0.3rem; margin-top: 0.3rem; }
    .add-cond-btn:hover { text-decoration: underline; }
    .and-divider { font-size: 0.65rem; font-weight: 700; color: #A0AEC0; text-align: center;
                   text-transform: uppercase; letter-spacing: 0.08em; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.65rem;
                    padding: 1rem 1.5rem; border-top: 1px solid #E2E8F0; }

    /* ── Flow selector bar ───────────────────────────────────────────── */
    /* Flow info bar replaces the tab row */
    .flow-info-bar { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 1.25rem;
                     border-bottom: 1px solid #E2E8F0; background: #fff; min-height: 46px; }
    .flow-info-name { font-size: 0.95rem; font-weight: 700; color: #2D3748; border: none;
                      background: transparent; outline: none; padding: 0.1rem 0.3rem;
                      border-radius: 4px; min-width: 60px; max-width: 260px; }
    .flow-info-name:hover { background: #F7FAFC; }
    .flow-info-name:focus { background: #EBF8FF; box-shadow: 0 0 0 2px #BEE3F8; }
    .flow-info-meta { font-size: 0.72rem; color: #A0AEC0; white-space: nowrap; }
    .flow-bar { display: flex; align-items: center; gap: 0.3rem; padding: 0.45rem 1rem;
                background: #fff; border-bottom: 1px solid #E2E8F0; flex-shrink: 0;
                overflow-x: auto; min-height: 44px; }
    .flow-tab { display: inline-flex; align-items: center; gap: 0.35rem;
                padding: 0.3rem 0.65rem; border-radius: 6px; font-size: 0.78rem;
                font-weight: 600; cursor: pointer; border: 1.5px solid transparent;
                color: #718096; white-space: nowrap; transition: all 0.15s; }
    .flow-tab:hover { background: #F7F8FA; }
    .flow-tab.active { background: #EEF2FF; border-color: #7B8FFF; color: #4338CA; }
    .flow-tab-trigger { font-size: 0.58rem; color: #A0AEC0; background: #F0F2F8;
                        border-radius: 3px; padding: 0.05rem 0.3rem; }
    .flow-tab-actions { display: inline-flex; align-items: center; gap: 0.15rem; margin-left: 0.1rem; }
    .flow-tab-icon-btn { color: #CBD5E0; background: none; border: none; cursor: pointer;
                         font-size: 0.7rem; padding: 0.1rem; line-height: 1; }
    .flow-tab-icon-btn:hover { color: #7B8FFF; }
    .flow-tab-icon-btn.del:hover { color: #EF4444; }
    .flow-add-btn { color: #7B8FFF; border: 1.5px dashed #CBD5E0; border-radius: 6px;

                    background: none; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
    .flow-add-btn:hover { border-color: #7B8FFF; background: #FAFBFF; }

    /* ── Analytics view ─────────────────────────────────────────────────── */
    .kpi-strip  { display: grid; gap: 1rem; margin-bottom: 1.25rem; }
    .kpi-card   { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 1.1rem 1.25rem; }
    .kpi-card.kpi-accent { border-color: #FEB2B2; background: #FFF5F5; }
    .kpi-label  { font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
                  letter-spacing: 0.08em; color: #A0AEC0; margin-bottom: 0.45rem; }
    .kpi-value  { font-size: 1.7rem; font-weight: 800; color: #1A202C; line-height: 1; }
    .kpi-accent .kpi-value { color: #C05621; }
    .kpi-sub    { font-size: 0.72rem; color: #718096; margin-top: 0.3rem; }
    .analytics-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .analytics-card   { background: #fff; border: 1px solid #E2E8F0; border-radius: 8px; padding: 1.1rem 1.25rem; }
    .analytics-card-title { font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
                            letter-spacing: 0.08em; color: #A0AEC0; margin-bottom: 0.875rem; }
    /* Horizontal bar chart */
    .bar-row         { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 0.55rem;
                       position: relative; }
    .bar-row-label   { font-size: 0.8rem; color: #2D3748; font-weight: 500; width: 110px; flex-shrink: 0;
                       white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track       { flex: 1; background: #F7F8FA; border-radius: 4px; height: 10px; overflow: hidden; }
    .bar-fill        { height: 100%; border-radius: 4px; transition: width .4s ease; }
    .bar-value       { font-size: 0.72rem; color: #718096; width: 76px; text-align: right; flex-shrink: 0; }
    /* Tooltip on hover */
    .has-tooltip     { cursor: default; }
    .bar-tooltip-box { display: none; position: absolute; bottom: calc(100% + 5px); left: 50%;
                       transform: translateX(-50%); background: #1A202C; color: #fff;
                       border-radius: 6px; padding: 0.35rem 0.65rem; font-size: 0.72rem;
                       white-space: nowrap; z-index: 200; pointer-events: none;
                       box-shadow: 0 2px 8px rgba(0,0,0,.25); }
    .bar-tooltip-box::after { content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
                              border:5px solid transparent; border-top-color:#1A202C; }
    .has-tooltip:hover .bar-tooltip-box { display: block; }
    /* Risk bars */
    .risk-bar-row   { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.65rem;
                      position: relative; }
    .risk-bar-label { width: 64px; flex-shrink: 0; }
    .risk-bar-track { flex: 1; background: #F7F8FA; border-radius: 4px; height: 14px; overflow: hidden; }
    .risk-bar-fill  { height: 100%; border-radius: 4px; }
    .risk-bar-count { font-size: 0.78rem; font-weight: 700; color: #2D3748; width: 28px; text-align: right; }
    /* Bottleneck + aging tables */
    .btl-table, .aging-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .btl-table th, .aging-table th { text-align: left; font-size: 0.63rem; font-weight: 700;
                      text-transform: uppercase; letter-spacing: 0.07em; color: #A0AEC0;
                      padding: 0 0 0.5rem; border-bottom: 1px solid #E2E8F0; }
    .btl-table td, .aging-table td { padding: 0.45rem 0; border-bottom: 1px solid #F7F8FA;
                      color: #2D3748; vertical-align: middle; padding-right: 0.5rem; }
    .btl-table tr:last-child td, .aging-table tr:last-child td { border-bottom: none; }
    /* Policy flags */
    .flag-chips      { display: flex; flex-wrap: wrap; gap: 0.45rem; }
    .flag-chip       { display: inline-flex; align-items: center; gap: 0.3rem; background: #FFF5F5;
                       color: #C53030; border: 1px solid #FEB2B2; border-radius: 6px;
                       padding: 0.2rem 0.6rem; font-size: 0.78rem; font-weight: 500; }
    .flag-chip-count { background: #C53030; color: #fff; border-radius: 99px;
                       padding: 0.05rem 0.35rem; font-size: 0.64rem; font-weight: 700; }
    /* Filter bar */
    .filter-bar     { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .filter-btn     { font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.65rem; border-radius: 6px;

                      transition: all .15s; white-space: nowrap; }
    .filter-btn:hover  { border-color: #7B8FFF; color: #7B8FFF; }
    .filter-btn.active { background: #7B8FFF; border-color: #7B8FFF; color: #fff; }
    .filter-select  { font-size: 0.75rem; padding: 0.3rem 0.55rem; border-radius: 6px;
                      border: 1px solid #E2E8F0; background: #fff; color: #718096; cursor: pointer; }
    .filter-divider { width: 1px; height: 18px; background: #E2E8F0; margin: 0 0.1rem; }
    /* Analytics tab navigation */
    .analytics-tabs { display:flex; gap:0; border-bottom:2px solid #E2E8F0; margin-bottom:1.25rem; }
    .analytics-tab  { padding:.5rem 1.1rem; font-size:.82rem; font-weight:600; cursor:pointer;
                      color:#718096; border-bottom:2px solid transparent; margin-bottom:-2px;
                      transition:color .15s,border-color .15s; white-space:nowrap; }
    .analytics-tab:hover  { color:#2D3748; }
    .analytics-tab.active { color:#7B8FFF; border-bottom-color:#7B8FFF; }
    /* Donut chart */
    .donut-wrap   { display:flex; align-items:center; gap:1.5rem; }
    .donut-legend { flex:1; min-width:0; }
    .donut-legend-item { display:flex; align-items:center; gap:.5rem; margin-bottom:.4rem; font-size:.78rem; color:#2D3748; }
    .donut-dot    { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    /* Heatmap */
    .heatmap-wrap { overflow-x:auto; }
    /* SLA chart header */
    .sla-header   { display:grid; grid-template-columns:120px 52px 1fr 80px; gap:.5rem; margin-bottom:.35rem;
                    font-size:.62rem; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#A0AEC0; }
    /* Spend detail table */
    .spend-table  { width:100%; border-collapse:collapse; font-size:.82rem; margin-top:.5rem; }
    .spend-table th { text-align:left; font-size:.63rem; font-weight:700; text-transform:uppercase;
                      letter-spacing:.07em; color:#A0AEC0; padding:.5rem .75rem;
                      border-bottom:2px solid #E2E8F0; white-space:nowrap; }
    .spend-table td { padding:.5rem .75rem; border-bottom:1px solid #F7F8FA; vertical-align:middle; }
    .spend-table tr:last-child td { border-bottom:none; }
    .stage-badge  { font-size:.68rem; font-weight:600; padding:.15rem .5rem; border-radius:99px;
                    display:inline-block; white-space:nowrap; }
    /* ── Decision modal ─────────────────────────────────────────────────── */
    .decision-modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.45);
      display:flex; align-items:center; justify-content:center; z-index:9999; }
    .decision-modal-box { background:#fff; border-radius:12px; width:420px; max-width:95vw;
      box-shadow:0 20px 60px rgba(0,0,0,0.18); overflow:hidden; }
    .decision-modal-hdr { padding:1.25rem 1.5rem 0; }
    .decision-modal-title { font-size:1rem; font-weight:700; color:#1A202C; margin-bottom:.2rem; }
    .decision-modal-sub { font-size:.78rem; color:#718096; }
    .decision-modal-body { padding:1.1rem 1.5rem; }
    .decision-modal-label { font-size:.7rem; font-weight:700; text-transform:uppercase;
      letter-spacing:.07em; color:#718096; margin-bottom:.4rem; }
    .decision-modal-textarea { width:100%; padding:.5rem .7rem; border:1px solid #CBD5E0;
      border-radius:6px; font-size:.84rem; font-family:inherit; resize:vertical;
      min-height:72px; box-sizing:border-box; }
    .decision-modal-textarea:focus { outline:none; border-color:#7B8FFF; }
    .decision-modal-footer { display:flex; justify-content:flex-end; gap:.6rem;
      padding:.9rem 1.5rem; border-top:1px solid #E2E8F0; }
    /* ── Search bar ─────────────────────────────────────────────────── */
    .search-bar { display:flex; align-items:center; gap:.6rem; padding:.6rem 1rem;
      border-bottom:1px solid #E2E8F0; background:#fff; }
    .search-input { flex:1; padding:.38rem .7rem; border:1px solid #CBD5E0; border-radius:6px;
      font-size:.82rem; font-family:inherit; }
    .search-input:focus { outline:none; border-color:#7B8FFF; }
    .search-select { padding:.36rem .55rem; border:1px solid #CBD5E0; border-radius:6px;
      font-size:.78rem; font-family:inherit; color:#4A5568; background:#fff; }
    .search-select:focus { outline:none; border-color:#7B8FFF; }
  </style>
</head>
<body>

<!-- ── Sidebar ──────────────────────────────────────────────────────────────── -->
<nav class="sidebar">
  <div class="sidebar-logo">Omnea <span>POC</span></div>
  <div class="nav-section">Approvals</div>
  <div class="nav-item active" id="nav-tasks" onclick="switchView('tasks')">
    <span>✓</span> Pending Approvals
    <span class="nav-badge" id="tasks-count">0</span>
  </div>
  <div class="nav-section">Procurement</div>
  <div class="nav-item" id="nav-requests" onclick="switchView('requests')">
    <span>📋</span> All Requests
  </div>
  <div class="nav-item" id="nav-intake" onclick="window.location.href='/chat'">
    <span>💬</span> New Request
  </div>
  <div class="nav-section">Requester</div>
  <div class="nav-item" id="nav-requester" onclick="switchView('requester')">
    <span>📍</span> Track Request
  </div>
  <div class="nav-section">Configuration</div>
  <div class="nav-item" id="nav-workflow" onclick="switchView('workflow')">
    <span>⚙</span> Workflow Rules
  </div>
  <div class="nav-section">Insights</div>
  <div class="nav-item" id="nav-analytics" onclick="switchView('analytics')">
    <span>📊</span> Analytics
  </div>
</nav>

<!-- ── Rule modal overlay (hidden until openRuleModal()) ─────────────────── -->
<div id="rule-modal" class="modal-overlay" style="display:none" onclick="handleModalBackdrop(event)">
  <div class="modal-box" id="rule-modal-box"></div>
</div>

<!-- ── Decision modal ───────────────────────────────────────────────────────── -->
<div id="decision-modal" class="decision-modal-overlay" style="display:none">
  <div class="decision-modal-box">
    <div class="decision-modal-hdr">
      <div class="decision-modal-title" id="dm-title">Confirm Decision</div>
      <div class="decision-modal-sub" id="dm-sub"></div>
    </div>
    <div class="decision-modal-body">
      <div class="decision-modal-label" id="dm-note-label">Note <span style="color:#A0AEC0;font-weight:400">(optional)</span></div>
      <textarea class="decision-modal-textarea" id="dm-note" placeholder="Add a note for the audit log…"></textarea>
    </div>
    <div class="decision-modal-footer">
      <button class="btn btn-outline" onclick="closeDecisionModal()">Cancel</button>
      <button class="btn" id="dm-confirm-btn" onclick="confirmDecisionModal()">Confirm</button>
    </div>
  </div>
</div>

<!-- ── Main ─────────────────────────────────────────────────────────────────── -->
<main class="main" id="main-content">
  <div class="loading-state">Loading…</div>
</main>

<script>
const API_BASE = "http://localhost:8080";
const API_KEY  = "dev-key-change-me";
const ESCALATION_MINUTES = 60;

const PRIORITY = {
  critical: { label: "Highest", dot: "#E53E3E", bars: [18,14,11,8] },
  high:     { label: "High",    dot: "#DD6B20", bars: [14,11,8,0]  },
  medium:   { label: "Medium",  dot: "#D69E2E", bars: [11,8,0,0]   },
  low:      { label: "Low",     dot: "#38A169", bars: [8,0,0,0]    },
};

const AVATAR_COLORS = ["#7B8FFF","#F6AD55","#68D391","#FC8181","#B794F4","#4FD1C5","#63B3ED"];

let S = {
  view: "tasks", prevView: "tasks",
  queue: [], requests: [], req: null, steps: [], focusStepId: null,
  taskFilter: "active",  // "active" | "complete" | "rejected"
  activePersona: null,   // null = all roles
  allStepsByRequest: {}, // request_id → [all steps incl. pending]
};

// ── Boot ──────────────────────────────────────────────────────────────────────
async function refreshBadge() {
  try {
    const queue = await fetch(`${API_BASE}/approvals/queue`).then(r => r.ok ? r.json() : []);
    const requestIds = [...new Set(queue.map(s => s.request_id))];
    const allSteps = (await Promise.all(
      requestIds.map(rid => fetch(`${API_BASE}/requests/${rid}/approval-steps`).then(r => r.ok ? r.json() : []))
    )).flat();
    const count = allSteps.filter(s => s.status === 'active' || s.status === 'pending').length || queue.length;
    document.getElementById("tasks-count").textContent = count;
  } catch {}
}

document.addEventListener("DOMContentLoaded", () => {
  const params = new URLSearchParams(window.location.search);
  const trackId = params.get("req");
  const validViews = ["tasks", "requests", "requester", "workflow", "analytics"];
  const hash = window.location.hash.replace("#", "");
  if (trackId) { openRequesterView(trackId); }
  else if (validViews.includes(hash)) { switchView(hash); }
  else { loadQueue(); }
  refreshBadge();
});

// ── Navigation ────────────────────────────────────────────────────────────────
function switchView(v, pushHistory = true) {
  S.view = v;
  if (pushHistory) history.pushState({ view: v }, "", "/dashboard#" + v);
  ["tasks","requests","requester","workflow","analytics"].forEach(n => {
    document.getElementById(`nav-${n}`)?.classList.toggle("active", n === v);
  });
  if (v === "tasks")          { S.taskFilter = "active"; loadQueue(); }
  else if (v === "requests")  { S.activePersona = null; loadRequests(); }
  else if (v === "requester") { S.activePersona = null; renderRequesterPicker(); }
  else if (v === "workflow")  { S.activePersona = null; loadWorkflowConfig(); }
  else if (v === "analytics") { S.activePersona = null; loadAnalytics(); }
}

window.addEventListener("popstate", (e) => {
  const state = e.state;
  const hash = window.location.hash.replace("#", "");
  const validViews = ["tasks", "requests", "requester", "workflow", "analytics"];
  const req = new URLSearchParams(window.location.search).get("req");
  if (req) { openRequesterView(req); }
  else if (state?.view && validViews.includes(state.view)) { switchView(state.view, false); }
  else if (validViews.includes(hash)) { switchView(hash, false); }
  else { switchView("tasks", false); }
});

// ── API calls ─────────────────────────────────────────────────────────────────
async function loadQueue() {
  showMain(`<div class="loading-state">Loading tasks…</div>`);
  try {
    const r = await fetch(`${API_BASE}/approvals/queue`);
    if (!r.ok) throw new Error(`${r.status}`);
    S.queue = await r.json();

    // Fetch all steps for each active request (needed for persona switcher blocked-step view)
    const requestIds = [...new Set(S.queue.map(s => s.request_id))];
    const results = await Promise.all(
      requestIds.map(rid =>
        fetch(`${API_BASE}/requests/${rid}/approval-steps`)
          .then(r2 => r2.ok ? r2.json() : [])
          .then(steps => [rid, steps])
      )
    );
    S.allStepsByRequest = Object.fromEntries(results);

    // Badge = total outstanding steps (active + pending) across all in-flight requests
    const totalOutstanding = Object.values(S.allStepsByRequest).flat()
      .filter(s => s.status === 'active' || s.status === 'pending').length;
    document.getElementById("tasks-count").textContent = totalOutstanding || S.queue.length;

    renderTasks();
  } catch (e) {
    showMain(`<div class="content"><div class="error-banner">Could not load queue: ${esc(e.message)}. Is the server running on port 8080?</div></div>`);
  }
}

async function loadRequests() {
  showMain(`<div class="loading-state">Loading requests…</div>`);
  try {
    const r = await fetch(`${API_BASE}/requests`);
    if (!r.ok) throw new Error(`${r.status}`);
    S.requests = await r.json();
    renderRequestsList();
  } catch (e) {
    showMain(`<div class="content"><div class="error-banner">Could not load requests: ${esc(e.message)}</div></div>`);
  }
}

async function openDetail(requestId, focusStepId = null) {
  showMain(`<div class="loading-state">Loading…</div>`);
  try {
    const [rr, sr] = await Promise.all([
      fetch(`${API_BASE}/requests/${requestId}`),
      fetch(`${API_BASE}/requests/${requestId}/approval-steps`),
    ]);
    if (!rr.ok || !sr.ok) throw new Error("Failed to load detail");
    S.req         = await rr.json();
    S.steps       = await sr.json();
    S.focusStepId = focusStepId;
    S.prevView    = S.view;
    S.view        = "detail";
    renderDetail();
  } catch (e) {
    showMain(`<div class="content"><div class="error-banner">Could not load detail: ${esc(e.message)}</div></div>`);
  }
}

async function decide(stepId, decision, note) {
  try {
    const r = await fetch(`${API_BASE}/approvals/${stepId}/decide`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ decision, note: note || null }),
    });
    if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.detail || r.status); }
    const q = await fetch(`${API_BASE}/approvals/queue`).then(r=>r.json());
    S.queue = q;
    refreshBadge();
    await openDetail(S.req.id, S.focusStepId);
  } catch (e) {
    showDecisionError(`Decision failed: ${e.message}`);
  }
}

async function doEscalate(stepId, note) {
  try {
    const r = await fetch(`${API_BASE}/approvals/${stepId}/escalate`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ note: note || null }),
    });
    if (!r.ok) { const d = await r.json().catch(()=>({})); throw new Error(d.detail || r.status); }
    const q = await fetch(`${API_BASE}/approvals/queue`).then(r=>r.json());
    S.queue = q;
    refreshBadge();
    await openDetail(S.req.id, S.focusStepId);
  } catch (e) {
    showDecisionError(`Escalation failed: ${e.message}`);
  }
}

// ── Decision modal ────────────────────────────────────────────────────────────
let _dmStepId = null, _dmDecision = null;

function openDecisionModal(stepId, decision) {
  _dmStepId = stepId;
  _dmDecision = decision;
  const titles = {
    approved: "Approve Request",
    rejected: "Reject Request",
    escalated: "Escalate to Senior Approver",
    request_info: "Request Additional Information",
  };
  const subs = {
    approved: "Approval will be recorded and the workflow will advance.",
    rejected: "Rejection is final. The requester will be notified.",
    escalated: "The step will be marked escalated and the workflow will advance.",
    request_info: "The workflow pauses until information is provided.",
  };
  const noteLabels = {
    approved: "Note <span style='color:#A0AEC0;font-weight:400'>(optional)</span>",
    rejected: "Rejection Reason <span style='color:#E53E3E;font-weight:400'>*</span>",
    escalated: "Escalation Reason <span style='color:#A0AEC0;font-weight:400'>(optional)</span>",
    request_info: "What information is needed? <span style='color:#E53E3E;font-weight:400'>*</span>",
  };
  const btnColors = {
    approved: "#276749",
    rejected: "#C53030",
    escalated: "#B7791F",
    request_info: "#2B6CB0",
  };
  document.getElementById("dm-title").textContent = titles[decision] || "Confirm";
  document.getElementById("dm-sub").textContent = subs[decision] || "";
  document.getElementById("dm-note-label").innerHTML = noteLabels[decision] || "Note";
  document.getElementById("dm-note").value = "";
  document.getElementById("dm-note").placeholder =
    decision === "request_info" ? "Describe what information is needed from the requester…"
    : decision === "rejected" ? "Explain why this request is being rejected…"
    : "Add a note for the audit log (optional)…";
  const btn = document.getElementById("dm-confirm-btn");
  btn.textContent = titles[decision] || "Confirm";
  btn.style.background = btnColors[decision] || "#7B8FFF";
  btn.style.color = "#fff";
  btn.style.border = "none";
  document.getElementById("decision-modal").style.display = "";
  document.getElementById("dm-note").focus();
}

function closeDecisionModal() {
  document.getElementById("decision-modal").style.display = "none";
  _dmStepId = null;
  _dmDecision = null;
}

function confirmDecisionModal() {
  const note = document.getElementById("dm-note").value.trim();
  if ((_dmDecision === "rejected" || _dmDecision === "request_info") && !note) {
    document.getElementById("dm-note").style.borderColor = "#E53E3E";
    document.getElementById("dm-note").focus();
    return;
  }
  document.getElementById("dm-note").style.borderColor = "";
  const stepId = _dmStepId, decision = _dmDecision;
  closeDecisionModal();
  if (decision === "escalated") {
    doEscalate(stepId, note || null);
  } else {
    decide(stepId, decision, note || null);
  }
}

function showDecisionError(msg) {
  const el = document.querySelector(".action-bar") || document.querySelector(".step-card");
  if (el) {
    const banner = document.createElement("div");
    banner.className = "error-banner";
    banner.style.cssText = "margin:.5rem 0;font-size:.8rem;padding:.5rem .75rem;";
    banner.textContent = msg;
    el.insertAdjacentElement("beforebegin", banner);
    setTimeout(() => banner.remove(), 4000);
  }
}

function promptDecide(stepId, decision) {
  openDecisionModal(stepId, decision);
}

// ── Pending Approvals view ─────────────────────────────────────────────────────────────
function renderTasks() {
  const q = S.queue;

  // Build persona dropdown from every approver across all fetched steps
  const personaMap = new Map(); // name → role_display_name (first seen)
  for (const steps of Object.values(S.allStepsByRequest)) {
    for (const s of steps) {
      if (s.approver_name && !personaMap.has(s.approver_name))
        personaMap.set(s.approver_name, s.role_display_name || '');
    }
  }
  for (const s of q) {
    if (s.approver_name && !personaMap.has(s.approver_name))
      personaMap.set(s.approver_name, s.role_display_name || '');
  }
  const personaOptions = [...personaMap.entries()]
    .sort((a, b) => a[0].localeCompare(b[0]))
    .map(([name, role]) => {
      const label = role ? `${name} — ${role}` : name;
      const sel = S.activePersona === name ? ' selected' : '';
      return `<option value="${esc(name)}"${sel}>${esc(label)}</option>`;
    }).join('');
  const personaBar = personaMap.size > 0 ? `
    <div class="persona-bar">
      <span class="persona-bar-label">Acting as:</span>
      <select class="persona-select" onchange="setPersona(this.value)">
        <option value="">All roles</option>
        ${personaOptions}
      </select>
    </div>` : '';

  const filterTabsHtml = (cnt) => `
    <div class="filter-tabs">
      <div class="filter-tab active" onclick="setTaskFilter('active')">Active <span class="filter-tab-count">${cnt}</span></div>
      <div class="filter-tab" onclick="setTaskFilter('complete')">Complete</div>
      <div class="filter-tab" onclick="setTaskFilter('rejected')">Rejected</div>
    </div>`;

  const COLS = "1.75rem 2.25rem 1fr 9rem 5.5rem 7rem 5rem";

  // ── Persona-selected view ────────────────────────────────────────────────────
  if (S.activePersona) {
    const persona = S.activePersona;
    const activeSteps = q.filter(s => s.approver_name === persona);

    // Pending (blocked) steps: persona has a step but earlier group is not yet approved
    const blockedSteps = [];
    for (const [rid, steps] of Object.entries(S.allStepsByRequest)) {
      for (const step of steps) {
        if (step.status === 'pending' && step.approver_name === persona) {
          const blockers = steps
            .filter(s => s.status === 'active')
            .map(s => s.approver_name || s.role_display_name)
            .filter(Boolean);
          blockedSteps.push({ ...step, _blockers: blockers });
        }
      }
    }

    // Request context map built from queue (which includes embedded request data)
    const reqCtx = {};
    for (const s of q) { if (s.request) reqCtx[s.request_id] = s.request; }

    // Active steps section
    let activeHtml = '';
    if (activeSteps.length > 0) {
      const rows = activeSteps.map(step => {
        const req = step.request || {};
        const rk = (req.risk_label || "low").toLowerCase();
        const p = PRIORITY[rk] || PRIORITY.low;
        const init = (req.supplier_name||"?")[0].toUpperCase();
        const col = AVATAR_COLORS[init.charCodeAt(0) % AVATAR_COLORS.length];
        const bars = p.bars.map(h =>
          `<div class="priority-bar" style="height:${Math.max(h,4)}px;background:${h>0?p.dot:'#E2E8F0'}"></div>`
        ).join("");
        const grpN = step.sequence_group;
        const _grps1 = [...new Set((S.allStepsByRequest[step.request_id]||[]).map(s=>s.sequence_group))].sort((a,b)=>a-b);
        const grpLabel = `${(_grps1.indexOf(grpN)+1)||grpN}/${_grps1.length||grpN}`;
        const ts = taskStatus(step);
        const preview = extractFirstBullet(step.ai_summary);
        return `
          <div class="task-row" style="grid-template-columns:${COLS}"
               onclick="openDetail('${esc(step.request_id)}', '${esc(step.id)}')">
            <div class="priority-bars">${bars}</div>
            <div class="supplier-avatar" style="background:${col}">${esc(init)}</div>
            <div>
              <div style="font-weight:600;font-size:0.875rem;color:#2D3748">${esc(req.supplier_name||"Unknown")}</div>
              <div style="font-size:0.72rem;color:#A0AEC0">${esc(req.category||"")} · ${formatCurrency(req.spend_amount)}</div>
              ${preview ? `<div class="task-summary-preview">✦ ${esc(preview)}</div>` : ""}
            </div>
            <div>
              <div style="font-size:0.84rem;color:#2D3748;font-weight:500">${esc(step.role_display_name)}</div>
              <div style="font-size:0.75rem;color:#718096">${esc(step.approver_name||"—")}</div>
            </div>
            <div><span class="status-badge status-active" style="font-size:0.68rem">${esc(grpLabel)}</span></div>
            <div><span class="status-badge ${ts.cls}" style="font-size:0.72rem">${ts.label}</span></div>
            <div style="color:#7B8FFF;font-size:0.8rem;font-weight:600;text-align:right">Review →</div>
          </div>`;
      }).join("");
      activeHtml = `
        <div class="priority-group">
          <div class="priority-group-header">
            <div class="priority-dot" style="background:#38A169"></div>
            <div class="priority-label-text">Your active steps</div>
            <div style="margin-left:auto;font-size:0.7rem;color:#A0AEC0">${activeSteps.length} step${activeSteps.length!==1?"s":""} awaiting your decision</div>
          </div>
          <div class="task-table">
            <div class="task-row header" style="grid-template-columns:${COLS}">
              <div></div><div></div>
              <div>Request / Summary</div><div>Role · Approver</div>
              <div>Stage</div><div>Status</div><div></div>
            </div>
            ${rows}
          </div>
        </div>`;
    }

    // Blocked (pending) steps section
    let blockedHtml = '';
    if (blockedSteps.length > 0) {
      const BCOLS = "2.25rem 1fr 9rem 7rem 1fr";
      const brows = blockedSteps.map(step => {
        const req = reqCtx[step.request_id] || {};
        const init = (req.supplier_name||"?")[0].toUpperCase();
        const col = AVATAR_COLORS[init.charCodeAt(0) % AVATAR_COLORS.length];
        const blockerLabel = step._blockers.length > 0
          ? step._blockers.slice(0, 3).join(", ") + (step._blockers.length > 3 ? " +more" : "")
          : "earlier approvers";
        return `
          <div class="task-row blocked" style="grid-template-columns:${BCOLS}">
            <div class="supplier-avatar" style="background:${col}">${esc(init)}</div>
            <div>
              <div style="font-weight:600;font-size:0.875rem;color:#2D3748">${esc(req.supplier_name||"Unknown")}</div>
              <div style="font-size:0.72rem;color:#A0AEC0">${esc(req.category||"")} · ${formatCurrency(req.spend_amount)}</div>
            </div>
            <div>
              <div style="font-size:0.84rem;color:#2D3748;font-weight:500">${esc(step.role_display_name)}</div>
              <div style="font-size:0.75rem;color:#718096">${esc(step.approver_name||"—")}</div>
            </div>
            <div><span class="status-badge status-pending" style="font-size:0.72rem">Blocked</span></div>
            <div><span class="waiting-badge">⏳ Waiting for ${esc(blockerLabel)}</span></div>
          </div>`;
      }).join("");
      blockedHtml = `
        <div class="priority-group">
          <div class="priority-group-header">
            <div class="priority-dot" style="background:#CBD5E0"></div>
            <div class="priority-label-text">Your upcoming steps</div>
            <div style="margin-left:auto;font-size:0.7rem;color:#A0AEC0">${blockedSteps.length} step${blockedSteps.length!==1?"s":""} awaiting earlier approvals</div>
          </div>
          <div class="task-table">
            <div class="task-row header" style="grid-template-columns:${BCOLS}">
              <div></div>
              <div>Request</div><div>Role · Approver</div><div>Status</div><div>Blocked by</div>
            </div>
            ${brows}
          </div>
        </div>`;
    }

    const nothingHtml = !activeHtml && !blockedHtml
      ? `<div class="empty-state"><div class="empty-icon">👤</div><div class="empty-title">No steps found</div><div>No active or upcoming steps assigned to ${esc(persona)}.</div></div>`
      : '';

    showMain(`
      <div class="topbar">
        <div><div class="topbar-title">Pending Approvals</div><div class="topbar-sub">${esc(persona)}'s view · ${activeSteps.length} active, ${blockedSteps.length} upcoming</div></div>
        <button class="btn btn-outline" onclick="loadQueue()">↻ Refresh</button>
      </div>
      ${personaBar}
      ${filterTabsHtml(q.length)}
      <div class="content" style="padding-top:1rem">
        ${activeHtml}${blockedHtml}${nothingHtml}
      </div>`);
    return;
  }

  // ── All-roles view (default) ─────────────────────────────────────────────────
  const activeCount = q.length;

  if (q.length === 0) {
    showMain(`
      <div class="topbar">
        <div><div class="topbar-title">Pending Approvals</div></div>
        <button class="btn btn-outline" onclick="loadQueue()">↻ Refresh</button>
      </div>

  }

  const ORDER = ["critical","high","medium","low"];
  const groups = {};
  for (const step of q) {
    const k = (step.request?.risk_label || "low").toLowerCase();
    (groups[k] = groups[k] || []).push(step);
  }

  const groupsHtml = ORDER.filter(k => groups[k]).map(k => {
    const p = PRIORITY[k];
    const rows = groups[k].map(step => {
      const req    = step.request || {};
      const init   = (req.supplier_name||"?")[0].toUpperCase();
      const col    = AVATAR_COLORS[init.charCodeAt(0) % AVATAR_COLORS.length];
      const bars   = p.bars.map(h =>
        `<div class="priority-bar" style="height:${Math.max(h,4)}px;background:${h>0?p.dot:'#E2E8F0'}"></div>`
      ).join("");
      const grpN   = step.sequence_group;
      const _grps2 = [...new Set((S.allStepsByRequest[step.request_id]||[]).map(s=>s.sequence_group))].sort((a,b)=>a-b);
      const grpLabel = `${(_grps2.indexOf(grpN)+1)||grpN}/${_grps2.length||grpN}`;
      const ts     = taskStatus(step);
      const preview = extractFirstBullet(step.ai_summary);
      return `
        <div class="task-row" style="grid-template-columns:${COLS}"
             onclick="openDetail('${esc(step.request_id)}', '${esc(step.id)}')">
          <div class="priority-bars">${bars}</div>
          <div class="supplier-avatar" style="background:${col}">${esc(init)}</div>
          <div>
            <div style="font-weight:600;font-size:0.875rem;color:#2D3748">${esc(req.supplier_name||"Unknown")}</div>
            <div style="font-size:0.72rem;color:#A0AEC0">${esc(req.category||"")} · ${formatCurrency(req.spend_amount)}</div>
            ${preview ? `<div class="task-summary-preview">✦ ${esc(preview)}</div>` : ""}
          </div>
          <div>
            <div style="font-size:0.84rem;color:#2D3748;font-weight:500">${esc(step.role_display_name)}</div>
            <div style="font-size:0.75rem;color:#718096">${esc(step.approver_name||"—")}</div>
          </div>
          <div>
            <span class="status-badge status-active" style="font-size:0.68rem">${esc(grpLabel)}</span>
          </div>
          <div>
            <span class="status-badge ${ts.cls}" style="font-size:0.72rem">${ts.label}</span>
          </div>
          <div style="color:#7B8FFF;font-size:0.8rem;font-weight:600;text-align:right">Review →</div>
        </div>`;
    }).join("");
    return `
      <div class="priority-group">
        <div class="priority-group-header">
          <div class="priority-dot" style="background:${p.dot}"></div>
          <div class="priority-label-text">Priority: ${p.label}</div>
          <div style="margin-left:auto;font-size:0.7rem;color:#A0AEC0">${groups[k].length} task${groups[k].length!==1?"s":""}</div>
        </div>
        <div class="task-table">
          <div class="task-row header" style="grid-template-columns:${COLS}">
            <div></div><div></div>
            <div>Request / Summary</div><div>Role · Approver</div>
            <div>Stage</div><div>Status</div><div></div>
          </div>
          ${rows}
        </div>
      </div>`;
  }).join("");

  showMain(`
    <div class="topbar">
      <div><div class="topbar-title">Pending Approvals</div><div class="topbar-sub">${q.length} pending approval${q.length!==1?"s":""} · grouped by priority</div></div>

      ${groupsHtml}
    </div>`);

function setTaskFilter(f) {
  S.taskFilter = f;
  if (f === "active") { loadQueue(); return; }
  S.activePersona = null;
  loadHistory(f);
}

function setPersona(name) {
  S.activePersona = name || null;
  renderTasks();
}

async function loadHistory(f) {
  showMain(`<div class="loading-state">Loading history…</div>`);
  try {
    const steps = await fetch(`${API_BASE}/approvals/history`).then(r => r.json());
    const filtered = f === "complete"
      ? steps.filter(s => s.status === "approved" || s.status === "escalated")
      : steps.filter(s => s.status === "rejected");
    renderHistory(filtered, f);
  } catch (e) {
    showMain(`<div class="content"><div class="error-banner">Could not load history: ${esc(e.message)}</div></div>`);
  }
}

function renderTimeline(steps) {
  if (!steps.length) return "";
  const TERMINAL = ["approved","skipped","escalated"];

  // Group steps by sequence_group
  const groupMap = new Map();
  for (const s of steps) {
    if (!groupMap.has(s.sequence_group)) groupMap.set(s.sequence_group, []);
    groupMap.get(s.sequence_group).push(s);
  }
  const groups = [...groupMap.entries()].sort(([a],[b]) => a-b).map(([,v]) => v);

  // Render into a 1000-unit wide viewBox so the SVG fills container width
  // while keeping height compact (height auto-adjusts proportionally).
  const VB_W    = 1000;
  const R       = 10;    // node radius
  const SPREAD  = 42;    // vertical gap between parallel nodes
  const LABEL_H = 30;    // space below nodes for name + date
  const PAD_TOP = 10;
  const FORK_PAD = 55;   // inset of fork/merge junctions from par-slot edges

  // Distribute slots proportionally: parallel groups get 1.5× the width
  const weights  = groups.map(g => g.length === 1 ? 1 : 1.5);
  const totalW   = weights.reduce((a,b) => a+b, 0);
  const unitW    = VB_W / totalW;

  const maxPar  = Math.max(...groups.map(g => g.length));
  const maxOff  = (maxPar - 1) * SPREAD / 2;
  const CY      = PAD_TOP + maxOff + R;
  const TOTAL_H = CY + maxOff + R + LABEL_H;
  const SVG_W   = VB_W;

  // Horizontal slots
  const slots = [];
  let cx = 0;
  for (let gi = 0; gi < groups.length; gi++) {
    const w = weights[gi] * unitW;
    slots.push({ xl: cx, xc: cx + w/2, xr: cx + w });
    cx += w;
  }

  // Node (x,y) for every step
  const nodePts = groups.map((grp, gi) => {
    const xc = slots[gi].xc;
    return grp.map((step, i) => ({
      x: xc,
      y: CY + (i - (grp.length - 1) / 2) * SPREAD,
      step,
    }));
  });

  const STATUS_FILL = { active:"#4299E1", approved:"#68D391", rejected:"#FC8181", escalated:"#F6AD55", skipped:"#E2E8F0", pending:"#fff" };
  const STATUS_STR  = { active:"#4299E1", approved:"#68D391", rejected:"#FC8181", escalated:"#F6AD55", skipped:"#CBD5E0", pending:"#CBD5E0" };

  function connClr(grp) { return grp.every(s => TERMINAL.includes(s.status)) ? "#9AE6B4" : "#CBD5E0"; }

  // Cubic bezier with horizontal tangents at both ends
  function bez(x1,y1,x2,y2) {
    const h = Math.abs(x2-x1) * 0.5;
    return `M${x1},${y1} C${x1+h},${y1} ${x2-h},${y2} ${x2},${y2}`;
  }

  function escX(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

  let paths = "", nodes = "", labels = "";

  // Connectors
  for (let gi = 0; gi < groups.length - 1; gi++) {
    const g1 = groups[gi], g2 = groups[gi+1];
    const p1 = nodePts[gi], p2 = nodePts[gi+1];
    const sl1 = slots[gi], sl2 = slots[gi+1];
    const col  = connClr(g1);
    const line = (x1,y1,x2,y2) => `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="2"/>`;
    const curv = (x1,y1,x2,y2) => `<path d="${bez(x1,y1,x2,y2)}" fill="none" stroke="${col}" stroke-width="2"/>`;

    if (g1.length === 1 && g2.length === 1) {
      paths += line(p1[0].x+R, CY, p2[0].x-R, CY);
    } else if (g1.length === 1 && g2.length > 1) {
      const forkX = sl2.xl + FORK_PAD;
      paths += line(p1[0].x+R, CY, forkX, CY);
      for (const pt of p2) paths += curv(forkX, CY, pt.x-R, pt.y);
    } else if (g1.length > 1 && g2.length === 1) {
      const mergeX = sl1.xr - FORK_PAD;
      for (const pt of p1) paths += curv(pt.x+R, pt.y, mergeX, CY);
      paths += line(mergeX, CY, p2[0].x-R, CY);
    } else {
      const mergeX = sl1.xr - FORK_PAD, forkX = sl2.xl + FORK_PAD;
      for (const pt of p1) paths += curv(pt.x+R, pt.y, mergeX, CY);
      paths += line(mergeX, CY, forkX, CY);
      for (const pt of p2) paths += curv(forkX, CY, pt.x-R, pt.y);
    }
  }

  // Nodes + labels
  for (let gi = 0; gi < groups.length; gi++) {
    for (const { x, y, step } of nodePts[gi]) {
      const fill = STATUS_FILL[step.status] || "#fff";
      const str  = STATUS_STR[step.status]  || "#CBD5E0";
      if (step.status === "active") nodes += `<circle cx="${x}" cy="${y}" r="${R+5}" fill="#BEE3F8" opacity="0.55"/>`;
      nodes += `<circle cx="${x}" cy="${y}" r="${R}" fill="${fill}" stroke="${str}" stroke-width="2"/>`;

      const name    = step.role_display_name.replace(" Team","").replace("Line ","");
      const dateStr = step.decided_at ? formatDateShort(step.decided_at) : step.status === "active" ? "Now" : "";
      labels += `<text x="${x}" y="${y+R+12}" text-anchor="middle" font-size="9.5" font-weight="700" fill="#2D3748" font-family="system-ui,sans-serif">${escX(name)}</text>`;
      if (dateStr) labels += `<text x="${x}" y="${y+R+21}" text-anchor="middle" font-size="9" fill="#A0AEC0" font-family="system-ui,sans-serif">${escX(dateStr)}</text>`;
    }
  }

  return `<div class="timeline-card">
    <div class="timeline-heading">Approval Timeline</div>
    <svg viewBox="0 0 ${SVG_W} ${TOTAL_H}" style="width:100%;height:auto;display:block;overflow:visible">
      ${paths}${nodes}${labels}
    </svg>
  </div>`;
}

function renderStepCard(step, req, allSteps = []) {
  const bullets     = summaryBullets(step.ai_summary || "");
  const isActive    = step.status === "active";
  const isTerminal  = ["approved", "rejected", "escalated", "skipped"].includes(step.status);
  const isDecided   = ["approved", "rejected", "escalated"].includes(step.status);

  // Group position badge
  const totalGroups = allSteps.length
    ? Math.max(...allSteps.map(s => s.sequence_group))
    : step.sequence_group;
  const groupTag = `Group ${step.sequence_group} of ${totalGroups}`;

  // Peer context bar — shown on active steps that have parallel peers
  const peers = allSteps.filter(s => s.sequence_group === step.sequence_group && s.id !== step.id);
  let peerBarHtml = "";
  if (isActive && peers.length > 0) {
    const peerList = peers.map(p => {
      const first = (p.approver_name || "").split(" ")[0];
      return `${esc(p.role_display_name)} (${esc(first)})`;
    }).join(", ");
    peerBarHtml = `
      <div class="peer-bar">
        <span style="font-weight:700;flex-shrink:0">↔ Reviewing in parallel:</span>
        <span style="margin-left:0.4rem">${peerList}</span>
      </div>`;
  }

  // Decision record for completed steps
  let decisionRecordHtml = "";
  if (isDecided) {
    const icons  = { approved: "✅", rejected: "❌", escalated: "⬆️" };
    const labels = { approved: "Approved", rejected: "Rejected", escalated: "Escalated for review" };
    const actor  = step.approver_name || step.role_display_name;
    const ts     = step.decided_at || step.escalated_at;
    const dateStr = ts ? formatDate(ts) : "";
    decisionRecordHtml = `
      <div class="decision-record">
        <div class="decision-record-icon">${icons[step.status] || "✓"}</div>
        <div class="decision-record-text">
          <strong>${labels[step.status] || step.status}</strong> by ${esc(actor)}
          ${dateStr ? `<div class="decision-record-time">${esc(dateStr)}</div>` : ""}
        </div>
      </div>`;
  }

  const noteHtml = step.decision_note
    ? `<div class="decision-note">📝 ${esc(step.decision_note)}</div>` : "";

  const actionBar = isActive ? `
    <div class="action-bar">
      <button class="btn btn-approve"  onclick="openDecisionModal('${esc(step.id)}','approved')">Approve</button>
      <button class="btn btn-reject"   onclick="openDecisionModal('${esc(step.id)}','rejected')">Reject</button>
      <button class="btn btn-escalate" onclick="openDecisionModal('${esc(step.id)}','escalated')">Escalate</button>
      <button class="btn btn-outline"  style="font-size:.8rem" onclick="openDecisionModal('${esc(step.id)}','request_info')">Request Info</button>
    </div>` : "";

  return `
    <div class="step-card">
      <div class="step-card-header${isActive?" is-active":""}">
        <div>
          <div class="step-card-role">${esc(step.role_display_name)}</div>
          <div class="step-card-approver">
            ${esc(step.approver_name||"")}
            <span style="color:#A0AEC0;font-size:0.7rem;font-weight:400;margin-left:0.45rem">${esc(groupTag)}</span>
          </div>
        </div>
        <div>${statusBadge(step.status)}</div>
      </div>
      <div class="step-card-body">
        ${peerBarHtml}
        ${decisionRecordHtml}
        ${bullets?`<div class="ai-label">Omnea Analyze</div><ul class="ai-bullets">${bullets}</ul>`:""}
        ${renderSourceData(step.role, req)}
        ${noteHtml}
        ${actionBar}
      </div>
    </div>`;
}

function promptDecide(stepId, decision) {
  if (decision === "rejected") {
    const note = prompt("Rejection note (optional):");
    decide(stepId, "rejected", note);
  } else {
    decide(stepId, decision, null);
  }
}

function backFromDetail() {
  S.focusStepId = null;
  S.view = S.prevView;
  ["tasks","requests","requester"].forEach(n =>
    document.getElementById(`nav-${n}`)?.classList.toggle("active", n === S.view)
  );
  if (S.view === "requests") renderRequestsList();
  else if (S.view === "requester") renderRequesterPicker();
